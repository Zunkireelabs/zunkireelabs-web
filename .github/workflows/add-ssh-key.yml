name: Add SSH Key to VPS

on:
  workflow_dispatch:

jobs:
  add-key:
    name: Add SSH Key
    runs-on: ubuntu-latest
    steps:
      - name: Add public key to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Add the new public key to authorized_keys
            PUBLIC_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPL84M3AiLy/jeNlU+FbAz3U0rr/tV99/4/7JxSvmvU4 zunkireelabs-vps"

            # Check if key already exists
            if grep -q "zunkireelabs-vps" ~/.ssh/authorized_keys 2>/dev/null; then
              echo "Key already exists"
            else
              echo "$PUBLIC_KEY" >> ~/.ssh/authorized_keys
              echo "Key added successfully"
            fi

            # Verify
            echo "Current authorized keys:"
            cat ~/.ssh/authorized_keys
