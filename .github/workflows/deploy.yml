name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: checks
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/zunkireelabs/devprojects/zunkiree-web-prod
            git pull origin main
            docker compose up -d --build
            echo "Waiting for container to be healthy..."
            sleep 10
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' zunkiree-production 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Container is healthy!"
                exit 0
              fi
              echo "Attempt $i/12: Status is $STATUS, waiting..."
              sleep 10
            done
            echo "Container did not become healthy within 2 minutes"
            docker logs zunkiree-production --tail 50
            exit 1

      - name: Verify Health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://zunkireelabs.com)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
          else
            echo "Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
