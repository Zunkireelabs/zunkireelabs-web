services:
  app:
    container_name: zunkiree-staging
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - hosting
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hosting"
      # NOTE: Traefik router/service names must be globally unique across ALL
      # containers on the `hosting` network. The generic name "zunkiree-staging"
      # collided with the zunkiree-search-api-staging container's router of the
      # same name, which made Traefik drop both routes (dev-web served a 404).
      # Keep these names project-specific (zunkiree-web-staging).
      # Staging domain (HTTPS)
      - "traefik.http.routers.zunkiree-web-staging.rule=Host(`dev-web.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-web-staging.entrypoints=websecure"
      - "traefik.http.routers.zunkiree-web-staging.tls=true"
      - "traefik.http.routers.zunkiree-web-staging.tls.certresolver=letsencrypt"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.zunkiree-web-staging-http.rule=Host(`dev-web.zunkireelabs.com`)"
      - "traefik.http.routers.zunkiree-web-staging-http.entrypoints=web"
      - "traefik.http.routers.zunkiree-web-staging-http.middlewares=zunkiree-web-staging-redirect"
      - "traefik.http.middlewares.zunkiree-web-staging-redirect.redirectscheme.scheme=https"
      # Service port
      - "traefik.http.services.zunkiree-web-staging.loadbalancer.server.port=80"

networks:
  hosting:
    external: true
