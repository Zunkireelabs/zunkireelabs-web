<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="np-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f9b34"/>
      <stop offset="100%" stop-color="#90a959"/>
    </linearGradient>
  </defs>

  <!-- Globe circle -->
  <circle cx="200" cy="148" r="90" fill="none" stroke="rgba(125,211,252,0.18)" stroke-width="1"/>
  <!-- Latitude lines -->
  <ellipse cx="200" cy="148" rx="90" ry="28" fill="none" stroke="rgba(125,211,252,0.12)" stroke-width="1"/>
  <ellipse cx="200" cy="148" rx="90" ry="60" fill="none" stroke="rgba(125,211,252,0.08)" stroke-width="1"/>
  <!-- Longitude -->
  <line x1="200" y1="58" x2="200" y2="238" stroke="rgba(125,211,252,0.12)" stroke-width="1"/>
  <line x1="110" y1="148" x2="290" y2="148" stroke="rgba(125,211,252,0.12)" stroke-width="1"/>

  <!-- Nepal shape -->
  <path d="M148 138 L160 132 L175 134 L188 130 L200 132 L215 128 L228 131 L240 136 L245 142 L240 148 L228 145 L215 148 L200 146 L188 149 L175 146 L160 150 L148 146 Z"
    fill="url(#np-accent)" opacity="0.85"/>

  <!-- Kathmandu dot + pulse -->
  <circle cx="200" cy="139" r="5" fill="white" opacity="0.95"/>
  <circle cx="200" cy="139" r="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1">
    <animate attributeName="r" values="8;16;8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 4-point star top-right -->
  <g transform="translate(338, 52) rotate(-10)">
    <path d="M0,-20 C3,-7 7,-3 20,0 C7,3 3,7 0,20 C-3,7 -7,3 -20,0 C-7,-3 -3,-7 0,-20Z" fill="#7dd3fc" opacity="0.90"/>
    <path d="M0,-11 C2,-4 4,-2 11,0 C4,2 2,4 0,11 C-2,4 -4,2 -11,0 C-4,-2 -2,-4 0,-11Z" fill="white" opacity="0.45"/>
  </g>

  <!-- Stat chip -->
  <rect x="258" y="172" width="112" height="52" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(125,211,252,0.25)" stroke-width="1"/>
  <text x="314" y="196" font-family="system-ui,sans-serif" font-size="21" font-weight="800" fill="#7dd3fc" text-anchor="middle">150th</text>
  <text x="314" y="213" font-family="system-ui,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)" text-anchor="middle">AI Readiness · 193 nations</text>

  <!-- Badge -->
  <rect x="20" y="22" width="108" height="20" fill="url(#np-accent)" rx="10"/>
  <text x="74" y="36" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="0.5">FEATURED REPORT</text>

  <!-- BG watermark -->
  <text x="42" y="258" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="rgba(255,255,255,0.04)" letter-spacing="2">NEPAL</text>
</svg>
