<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="impl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="impl-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#impl-bg)"/>

  <!-- Subtle grid -->
  <g stroke="#fff" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Roadmap path -->
  <path d="M100 350 Q200 350 250 280 Q300 210 400 210 Q500 210 550 150 Q600 90 700 90"
        fill="none" stroke="url(#impl-accent)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- Milestone nodes -->
  <g>
    <!-- Node 1: Start -->
    <circle cx="100" cy="350" r="20" fill="#064e3b" stroke="#10b981" stroke-width="3"/>
    <text x="100" y="355" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">1</text>
    <text x="100" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Assess</text>

    <!-- Node 2 -->
    <circle cx="250" cy="280" r="20" fill="#064e3b" stroke="#10b981" stroke-width="3"/>
    <text x="250" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">2</text>
    <text x="250" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Plan</text>

    <!-- Node 3 -->
    <circle cx="400" cy="210" r="20" fill="#064e3b" stroke="#10b981" stroke-width="3"/>
    <text x="400" y="215" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">3</text>
    <text x="400" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Build</text>

    <!-- Node 4 -->
    <circle cx="550" cy="150" r="20" fill="#064e3b" stroke="#10b981" stroke-width="3"/>
    <text x="550" y="155" font-family="system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle">4</text>
    <text x="550" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Deploy</text>

    <!-- Node 5: End -->
    <circle cx="700" cy="90" r="25" fill="#10b981" stroke="#34d399" stroke-width="3"/>
    <text x="700" y="95" font-family="system-ui, sans-serif" font-size="14" fill="#fff" text-anchor="middle">5</text>
    <text x="700" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Scale</text>
  </g>

  <!-- Budget tiers -->
  <g transform="translate(60, 60)">
    <rect width="150" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="75" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">STARTER</text>
    <text x="75" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">NPR 50K</text>
  </g>

  <g transform="translate(230, 60)">
    <rect width="150" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="75" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">GROWTH</text>
    <text x="75" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">NPR 500K</text>
  </g>

  <g transform="translate(400, 60)">
    <rect width="150" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="75" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#10b981" text-anchor="middle">ENTERPRISE</text>
    <text x="75" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">NPR 5M+</text>
  </g>

  <!-- Guide label -->
  <rect x="650" y="380" width="100" height="35" fill="url(#impl-accent)" rx="4"/>
  <text x="700" y="403" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">GUIDE</text>
</svg>