<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="cloud-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="cloud-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#cloud-bg)"/>

  <!-- Cloud shapes background -->
  <g fill="#fff" opacity="0.05">
    <ellipse cx="150" cy="100" rx="80" ry="50"/>
    <ellipse cx="200" cy="90" rx="60" ry="40"/>
    <ellipse cx="120" cy="110" rx="50" ry="35"/>

    <ellipse cx="650" cy="350" rx="90" ry="55"/>
    <ellipse cx="700" cy="340" rx="70" ry="45"/>
    <ellipse cx="620" cy="360" rx="55" ry="40"/>
  </g>

  <!-- Server/infrastructure visualization -->
  <g transform="translate(100, 120)">
    <!-- Server rack -->
    <rect width="180" height="200" fill="#fff" opacity="0.1" rx="8"/>

    <!-- Server units -->
    <g transform="translate(10, 10)">
      <rect width="160" height="35" fill="#0e7490" rx="4"/>
      <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
      <rect x="35" y="12" width="80" height="4" fill="#fff" opacity="0.3" rx="2"/>
      <rect x="35" y="20" width="60" height="4" fill="#fff" opacity="0.2" rx="2"/>
      <circle cx="140" cy="17" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(10, 55)">
      <rect width="160" height="35" fill="#0e7490" rx="4"/>
      <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
      <rect x="35" y="12" width="100" height="4" fill="#fff" opacity="0.3" rx="2"/>
      <rect x="35" y="20" width="70" height="4" fill="#fff" opacity="0.2" rx="2"/>
      <circle cx="140" cy="17" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(10, 100)">
      <rect width="160" height="35" fill="#0e7490" rx="4"/>
      <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
      <rect x="35" y="12" width="90" height="4" fill="#fff" opacity="0.3" rx="2"/>
      <rect x="35" y="20" width="50" height="4" fill="#fff" opacity="0.2" rx="2"/>
      <circle cx="140" cy="17" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(10, 145)">
      <rect width="160" height="35" fill="#0e7490" rx="4"/>
      <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
      <rect x="35" y="12" width="75" height="4" fill="#fff" opacity="0.3" rx="2"/>
      <rect x="35" y="20" width="55" height="4" fill="#fff" opacity="0.2" rx="2"/>
      <circle cx="140" cy="17" r="4" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Connection lines to cloud -->
  <g stroke="url(#cloud-accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M290 180 Q350 180 400 140 Q450 100 500 120"/>
    <path d="M290 220 Q380 220 500 180"/>
    <path d="M290 260 Q350 260 400 300 Q450 340 500 320"/>
  </g>

  <!-- Central cloud icon -->
  <g transform="translate(480, 140)">
    <ellipse cx="80" cy="60" rx="70" ry="45" fill="url(#cloud-accent)" opacity="0.3"/>
    <ellipse cx="110" cy="50" rx="55" ry="35" fill="url(#cloud-accent)" opacity="0.4"/>
    <ellipse cx="60" cy="65" rx="45" ry="30" fill="url(#cloud-accent)" opacity="0.4"/>
    <text x="85" y="65" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">AI OPS</text>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(350, 280)">
    <rect width="130" height="70" fill="#fff" opacity="0.1" rx="8"/>
    <text x="65" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">60%</text>
    <text x="65" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Cost Reduction</text>
  </g>

  <g transform="translate(500, 280)">
    <rect width="130" height="70" fill="#fff" opacity="0.1" rx="8"/>
    <text x="65" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">80%</text>
    <text x="65" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Faster Resolution</text>
  </g>

  <g transform="translate(650, 280)">
    <rect width="100" height="70" fill="#fff" opacity="0.1" rx="8"/>
    <text x="50" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">99.9%</text>
    <text x="50" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Uptime</text>
  </g>

  <!-- Company name -->
  <text x="80" y="390" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#fff">CORECLOUD365</text>
  <text x="80" y="415" font-family="system-ui, sans-serif" font-size="13" fill="#fff" opacity="0.7">Cloud Operations Platform</text>

  <!-- Case study badge -->
  <rect x="640" y="380" width="110" height="35" fill="url(#cloud-accent)" rx="4"/>
  <text x="695" y="403" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0e7490" text-anchor="middle">CASE STUDY</text>
</svg>