<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="stack-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="stack-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EB1600"/>
      <stop offset="100%" stop-color="#ff4d4d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#stack-bg)"/>

  <!-- Stack layers visualization -->
  <g transform="translate(100, 80)">
    <!-- Layer 1: Infrastructure -->
    <g transform="translate(0, 200)">
      <rect width="300" height="60" fill="#334155" rx="4"/>
      <text x="150" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">INFRASTRUCTURE</text>
      <text x="150" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">Cloud / On-Premise</text>
    </g>

    <!-- Layer 2: Data -->
    <g transform="translate(25, 130)">
      <rect width="250" height="60" fill="#475569" rx="4"/>
      <text x="125" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">DATA LAYER</text>
      <text x="125" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">Indexing / Embeddings</text>
    </g>

    <!-- Layer 3: AI/ML -->
    <g transform="translate(50, 60)">
      <rect width="200" height="60" fill="#64748b" rx="4"/>
      <text x="100" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">AI / ML LAYER</text>
      <text x="100" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">NLU / Ranking</text>
    </g>

    <!-- Layer 4: API -->
    <g transform="translate(75, -10)">
      <rect width="150" height="60" fill="url(#stack-accent)" rx="4"/>
      <text x="75" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">API LAYER</text>
      <text x="75" y="52" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Search Endpoints</text>
    </g>

    <!-- Connecting arrows -->
    <g stroke="#fff" stroke-width="1" opacity="0.3">
      <line x1="150" y1="55" x2="150" y2="55"/>
    </g>
  </g>

  <!-- Right side: architecture diagram -->
  <g transform="translate(480, 100)">
    <!-- User -->
    <g>
      <circle cx="40" cy="30" r="20" fill="#fff" opacity="0.2"/>
      <text x="40" y="35" font-family="system-ui, sans-serif" font-size="10" fill="#fff" text-anchor="middle">User</text>
    </g>

    <!-- Arrow -->
    <line x1="60" y1="50" x2="60" y2="80" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <polygon points="60,85 55,75 65,75" fill="#fff" opacity="0.3"/>

    <!-- API box -->
    <g transform="translate(0, 90)">
      <rect width="80" height="40" fill="url(#stack-accent)" opacity="0.8" rx="4"/>
      <text x="40" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">API</text>
    </g>

    <!-- Arrow -->
    <line x1="80" y1="110" x2="120" y2="110" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <polygon points="125,110 115,105 115,115" fill="#fff" opacity="0.3"/>

    <!-- AI Engine -->
    <g transform="translate(130, 90)">
      <rect width="100" height="40" fill="#64748b" rx="4"/>
      <text x="50" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">AI Engine</text>
    </g>

    <!-- Arrow down -->
    <line x1="180" y1="130" x2="180" y2="160" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <polygon points="180,165 175,155 185,155" fill="#fff" opacity="0.3"/>

    <!-- Data sources -->
    <g transform="translate(100, 170)">
      <rect width="160" height="50" fill="#334155" rx="4"/>
      <text x="80" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Data Sources</text>
      <g transform="translate(20, 30)">
        <rect width="30" height="15" fill="#fff" opacity="0.2" rx="2"/>
        <rect x="40" width="30" height="15" fill="#fff" opacity="0.2" rx="2"/>
        <rect x="80" width="30" height="15" fill="#fff" opacity="0.2" rx="2"/>
      </g>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="380" font-family="system-ui, sans-serif" font-size="14" fill="#fff" opacity="0.5">ENTERPRISE GUIDE</text>
  <text x="80" y="410" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#fff">The AI Search Stack</text>

  <!-- Ebook badge -->
  <rect x="650" y="380" width="90" height="35" fill="url(#stack-accent)" rx="4"/>
  <text x="695" y="403" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">EBOOK</text>
</svg>