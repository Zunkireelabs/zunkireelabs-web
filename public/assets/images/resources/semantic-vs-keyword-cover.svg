<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="semantic-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#semantic-bg)"/>

  <!-- Divider -->
  <line x1="400" y1="80" x2="400" y2="370" stroke="#fff" stroke-width="1" opacity="0.15"/>

  <!-- Left: Semantic Search -->
  <g transform="translate(50, 80)">
    <text x="150" y="0" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#22c55e" text-anchor="middle">SEMANTIC</text>

    <!-- Query visualization -->
    <g transform="translate(20, 40)">
      <rect width="260" height="45" fill="#fff" opacity="0.1" rx="22"/>
      <text x="130" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">"best laptop for students"</text>
    </g>

    <!-- Understanding arrows -->
    <g transform="translate(100, 100)">
      <line x1="50" y1="0" x2="50" y2="30" stroke="#22c55e" stroke-width="2"/>
      <polygon points="50,35 45,25 55,25" fill="#22c55e"/>
    </g>

    <!-- Meaning extraction -->
    <g transform="translate(20, 140)">
      <rect width="260" height="80" fill="#22c55e" opacity="0.15" rx="8"/>
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#22c55e">UNDERSTANDS:</text>
      <text x="20" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Intent: recommendation</text>
      <text x="20" y="62" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Context: education, budget</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 240)">
      <rect width="260" height="35" fill="#22c55e" opacity="0.2" rx="6"/>
      <circle cx="20" cy="17" r="8" fill="#22c55e"/>
      <text x="40" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Direct answer + ranked results</text>
    </g>

    <g transform="translate(20, 285)">
      <rect width="260" height="35" fill="#22c55e" opacity="0.15" rx="6"/>
      <circle cx="20" cy="17" r="8" fill="#22c55e" opacity="0.7"/>
      <text x="40" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.8">Related recommendations</text>
    </g>
  </g>

  <!-- Right: Keyword Search -->
  <g transform="translate(450, 80)">
    <text x="150" y="0" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#6b7280" text-anchor="middle">KEYWORD</text>

    <!-- Query visualization -->
    <g transform="translate(20, 40)">
      <rect width="260" height="45" fill="#fff" opacity="0.1" rx="22"/>
      <text x="130" y="28" font-family="system-ui, sans-serif" font-size="13" fill="#fff" text-anchor="middle">"best laptop for students"</text>
    </g>

    <!-- Matching arrows -->
    <g transform="translate(100, 100)">
      <line x1="50" y1="0" x2="50" y2="30" stroke="#6b7280" stroke-width="2"/>
      <polygon points="50,35 45,25 55,25" fill="#6b7280"/>
    </g>

    <!-- Keyword matching -->
    <g transform="translate(20, 140)">
      <rect width="260" height="80" fill="#6b7280" opacity="0.15" rx="8"/>
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">MATCHES:</text>
      <text x="20" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#fff">"best" + "laptop" + "students"</text>
      <text x="20" y="62" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.6">Exact string matching only</text>
    </g>

    <!-- Results -->
    <g transform="translate(20, 240)">
      <rect width="260" height="35" fill="#6b7280" opacity="0.2" rx="6"/>
      <circle cx="20" cy="17" r="8" fill="#6b7280"/>
      <text x="40" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#fff">Page with "best laptop"</text>
    </g>

    <g transform="translate(20, 285)">
      <rect width="260" height="35" fill="#6b7280" opacity="0.15" rx="6"/>
      <circle cx="20" cy="17" r="8" fill="#6b7280" opacity="0.7"/>
      <text x="40" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.8">Page with "student laptop"</text>
    </g>
  </g>

  <!-- VS badge -->
  <circle cx="400" cy="220" r="30" fill="#1e293b" stroke="#fff" stroke-width="2"/>
  <text x="400" y="227" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">VS</text>

  <!-- Whitepaper badge -->
  <rect x="330" y="395" width="140" height="30" fill="#fff" opacity="0.1" rx="4"/>
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">WHITEPAPER</text>
</svg>