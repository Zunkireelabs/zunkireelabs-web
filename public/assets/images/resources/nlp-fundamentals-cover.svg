<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="nlp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581c87"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="nlp-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#nlp-bg)"/>

  <!-- Neural network visualization -->
  <g transform="translate(100, 100)">
    <!-- Input layer -->
    <g fill="url(#nlp-accent)" opacity="0.6">
      <circle cx="0" cy="0" r="15"/>
      <circle cx="0" cy="60" r="15"/>
      <circle cx="0" cy="120" r="15"/>
      <circle cx="0" cy="180" r="15"/>
    </g>

    <!-- Hidden layer 1 -->
    <g fill="#fff" opacity="0.4">
      <circle cx="120" cy="30" r="12"/>
      <circle cx="120" cy="90" r="12"/>
      <circle cx="120" cy="150" r="12"/>
    </g>

    <!-- Hidden layer 2 -->
    <g fill="#fff" opacity="0.5">
      <circle cx="240" cy="60" r="12"/>
      <circle cx="240" cy="120" r="12"/>
    </g>

    <!-- Output layer -->
    <g fill="url(#nlp-accent)" opacity="0.8">
      <circle cx="360" cy="90" r="18"/>
    </g>

    <!-- Connections -->
    <g stroke="#fff" stroke-width="1" opacity="0.15">
      <!-- Input to hidden 1 -->
      <line x1="15" y1="0" x2="108" y2="30"/>
      <line x1="15" y1="0" x2="108" y2="90"/>
      <line x1="15" y1="60" x2="108" y2="30"/>
      <line x1="15" y1="60" x2="108" y2="90"/>
      <line x1="15" y1="60" x2="108" y2="150"/>
      <line x1="15" y1="120" x2="108" y2="90"/>
      <line x1="15" y1="120" x2="108" y2="150"/>
      <line x1="15" y1="180" x2="108" y2="150"/>

      <!-- Hidden 1 to hidden 2 -->
      <line x1="132" y1="30" x2="228" y2="60"/>
      <line x1="132" y1="30" x2="228" y2="120"/>
      <line x1="132" y1="90" x2="228" y2="60"/>
      <line x1="132" y1="90" x2="228" y2="120"/>
      <line x1="132" y1="150" x2="228" y2="60"/>
      <line x1="132" y1="150" x2="228" y2="120"/>

      <!-- Hidden 2 to output -->
      <line x1="252" y1="60" x2="342" y2="90"/>
      <line x1="252" y1="120" x2="342" y2="90"/>
    </g>
  </g>

  <!-- Text flow visualization -->
  <g transform="translate(500, 120)">
    <rect width="240" height="40" fill="#fff" opacity="0.1" rx="20"/>
    <text x="120" y="27" font-family="system-ui, sans-serif" font-size="14" fill="#fff" text-anchor="middle">"Understanding language"</text>

    <!-- Arrow down -->
    <line x1="120" y1="50" x2="120" y2="80" stroke="url(#nlp-accent)" stroke-width="2"/>
    <polygon points="120,85 115,75 125,75" fill="url(#nlp-accent)"/>

    <!-- Embeddings box -->
    <g transform="translate(0, 90)">
      <rect width="240" height="50" fill="url(#nlp-accent)" opacity="0.2" rx="8"/>
      <text x="120" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#d946ef" text-anchor="middle">EMBEDDINGS</text>
      <text x="120" y="40" font-family="monospace" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">[0.23, -0.45, 0.78, ...]</text>
    </g>

    <!-- Arrow down -->
    <line x1="120" y1="150" x2="120" y2="180" stroke="url(#nlp-accent)" stroke-width="2"/>
    <polygon points="120,185 115,175 125,175" fill="url(#nlp-accent)"/>

    <!-- Transformer box -->
    <g transform="translate(0, 190)">
      <rect width="240" height="50" fill="#fff" opacity="0.1" rx="8"/>
      <text x="120" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">TRANSFORMER</text>
    </g>
  </g>

  <!-- Labels -->
  <g font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5">
    <text x="100" y="320">Input</text>
    <text x="200" y="320">Hidden</text>
    <text x="320" y="320">Hidden</text>
    <text x="440" y="320">Output</text>
  </g>

  <!-- Title -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#fff">NLP Fundamentals</text>
  <text x="80" y="425" font-family="system-ui, sans-serif" font-size="13" fill="#fff" opacity="0.6">From Theory to Production</text>

  <!-- Guide badge -->
  <rect x="660" y="390" width="80" height="30" fill="url(#nlp-accent)" rx="4"/>
  <text x="700" y="410" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">GUIDE</text>
</svg>