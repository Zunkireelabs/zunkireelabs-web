<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="construction-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="construction-accent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#construction-bg)"/>

  <!-- Skyline silhouette -->
  <g fill="#fff" opacity="0.05">
    <rect x="50" y="200" width="60" height="250"/>
    <rect x="130" y="150" width="80" height="300"/>
    <rect x="230" y="180" width="50" height="270"/>
    <rect x="300" y="120" width="70" height="330"/>
    <rect x="390" y="160" width="55" height="290"/>
    <rect x="470" y="100" width="90" height="350"/>
    <rect x="580" y="140" width="65" height="310"/>
    <rect x="670" y="170" width="80" height="280"/>
  </g>

  <!-- Construction crane -->
  <g stroke="#fff" stroke-width="3" fill="none" opacity="0.3">
    <line x1="650" y1="400" x2="650" y2="80"/>
    <line x1="650" y1="80" x2="750" y2="80"/>
    <line x1="650" y1="80" x2="600" y2="80"/>
    <line x1="750" y1="80" x2="750" y2="150"/>
    <line x1="650" y1="100" x2="750" y2="80"/>
    <line x1="650" y1="120" x2="720" y2="80"/>
  </g>

  <!-- Project progress bars -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.7">SITE PROGRESS</text>

    <!-- Site 1 -->
    <g transform="translate(0, 20)">
      <rect width="250" height="8" fill="#fff" opacity="0.2" rx="4"/>
      <rect width="200" height="8" fill="url(#construction-accent)" rx="4"/>
      <text x="260" y="8" font-family="system-ui, sans-serif" font-size="11" fill="#fff">80%</text>
    </g>

    <!-- Site 2 -->
    <g transform="translate(0, 45)">
      <rect width="250" height="8" fill="#fff" opacity="0.2" rx="4"/>
      <rect width="175" height="8" fill="url(#construction-accent)" rx="4"/>
      <text x="260" y="8" font-family="system-ui, sans-serif" font-size="11" fill="#fff">70%</text>
    </g>

    <!-- Site 3 -->
    <g transform="translate(0, 70)">
      <rect width="250" height="8" fill="#fff" opacity="0.2" rx="4"/>
      <rect width="225" height="8" fill="url(#construction-accent)" rx="4"/>
      <text x="260" y="8" font-family="system-ui, sans-serif" font-size="11" fill="#fff">90%</text>
    </g>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(80, 280)">
    <rect width="140" height="80" fill="#fff" opacity="0.1" rx="8"/>
    <text x="70" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">40%</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Less Delays</text>
  </g>

  <g transform="translate(240, 280)">
    <rect width="140" height="80" fill="#fff" opacity="0.1" rx="8"/>
    <text x="70" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">2.5Cr</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">NPR Saved</text>
  </g>

  <g transform="translate(400, 280)">
    <rect width="140" height="80" fill="#fff" opacity="0.1" rx="8"/>
    <text x="70" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">15+</text>
    <text x="70" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7" text-anchor="middle">Active Sites</text>
  </g>

  <!-- Company name -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#fff" opacity="0.9">KHUSHBU NIRMAN SEWA</text>

  <!-- Case study badge -->
  <rect x="620" y="380" width="120" height="35" fill="url(#construction-accent)" rx="4"/>
  <text x="680" y="403" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#7c2d12" text-anchor="middle">CASE STUDY</text>
</svg>