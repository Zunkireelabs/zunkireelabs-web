<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="dental-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c"/>
      <stop offset="100%" style="stop-color:#eb1600"/>
    </linearGradient>
    <linearGradient id="dental-gradient-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#eb1600;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background pattern - soft curves -->
  <g opacity="0.05">
    <circle cx="300" cy="200" r="180" stroke="white" stroke-width="1" fill="none"/>
    <circle cx="300" cy="200" r="240" stroke="white" stroke-width="1" fill="none"/>
    <circle cx="300" cy="200" r="300" stroke="white" stroke-width="1" fill="none"/>
  </g>

  <!-- Main chat interface container -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="240" height="240" rx="16" fill="white" opacity="0.07"/>
    <rect x="0" y="0" width="240" height="240" rx="16" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- Chat header -->
    <rect x="0" y="0" width="240" height="40" rx="16" fill="white" opacity="0.05"/>
    <circle cx="24" cy="20" r="10" fill="url(#dental-gradient)" opacity="0.8"/>
    <rect x="42" y="14" width="60" height="6" rx="2" fill="white" opacity="0.5"/>
    <rect x="42" y="24" width="40" height="4" rx="1" fill="white" opacity="0.25"/>
    <circle cx="216" cy="20" r="4" fill="#4ade80" opacity="0.8"/>

    <!-- Chat messages -->
    <!-- User message -->
    <g transform="translate(80, 60)">
      <rect x="0" y="0" width="140" height="36" rx="12" fill="url(#dental-gradient)" opacity="0.8"/>
      <rect x="12" y="10" width="80" height="5" rx="2" fill="white" opacity="0.8"/>
      <rect x="12" y="20" width="50" height="5" rx="2" fill="white" opacity="0.5"/>
    </g>

    <!-- AI response -->
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="160" height="50" rx="12" fill="white" opacity="0.1"/>
      <rect x="12" y="10" width="100" height="5" rx="2" fill="white" opacity="0.5"/>
      <rect x="12" y="20" width="120" height="5" rx="2" fill="white" opacity="0.4"/>
      <rect x="12" y="30" width="80" height="5" rx="2" fill="white" opacity="0.3"/>
    </g>

    <!-- User message 2 -->
    <g transform="translate(100, 175)">
      <rect x="0" y="0" width="120" height="28" rx="10" fill="url(#dental-gradient)" opacity="0.7"/>
      <rect x="12" y="10" width="60" height="5" rx="2" fill="white" opacity="0.8"/>
    </g>

    <!-- Input field -->
    <g transform="translate(12, 210)">
      <rect x="0" y="0" width="216" height="24" rx="12" fill="white" opacity="0.08"/>
      <rect x="12" y="8" width="80" height="4" rx="1" fill="white" opacity="0.3"/>
      <circle cx="196" cy="12" r="8" fill="url(#dental-gradient)" opacity="0.6"/>
    </g>
  </g>

  <!-- Calendar widget - left side -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="90" height="100" rx="10" fill="white" opacity="0.08"/>
    <rect x="0" y="0" width="90" height="100" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- Calendar header -->
    <rect x="8" y="8" width="74" height="16" rx="4" fill="url(#dental-gradient)" opacity="0.6"/>

    <!-- Calendar grid -->
    <g transform="translate(12, 32)" opacity="0.4">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="white"/>
      <rect x="16" y="0" width="10" height="10" rx="2" fill="white"/>
      <rect x="32" y="0" width="10" height="10" rx="2" fill="white"/>
      <rect x="48" y="0" width="10" height="10" rx="2" fill="white" opacity="0.3"/>
      <rect x="64" y="0" width="10" height="10" rx="2" fill="white" opacity="0.3"/>

      <rect x="0" y="16" width="10" height="10" rx="2" fill="white" opacity="0.3"/>
      <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#dental-gradient)" opacity="1"/>
      <rect x="32" y="16" width="10" height="10" rx="2" fill="white"/>
      <rect x="48" y="16" width="10" height="10" rx="2" fill="white"/>
      <rect x="64" y="16" width="10" height="10" rx="2" fill="white" opacity="0.3"/>

      <rect x="0" y="32" width="10" height="10" rx="2" fill="white" opacity="0.3"/>
      <rect x="16" y="32" width="10" height="10" rx="2" fill="white"/>
      <rect x="32" y="32" width="10" height="10" rx="2" fill="white"/>
      <rect x="48" y="32" width="10" height="10" rx="2" fill="white"/>
      <rect x="64" y="32" width="10" height="10" rx="2" fill="white"/>
    </g>
  </g>

  <!-- Notification bell - top right -->
  <g transform="translate(460, 100)">
    <circle cx="30" cy="30" r="30" fill="white" opacity="0.08"/>
    <circle cx="30" cy="30" r="30" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>
    <path d="M30 18 C30 18 22 22 22 32 L22 36 L18 40 L42 40 L38 36 L38 32 C38 22 30 18 30 18"
          fill="none" stroke="url(#dental-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="30" cy="44" r="3" fill="url(#dental-gradient)"/>
    <circle cx="40" cy="20" r="6" fill="#4ade80" opacity="0.9"/>
    <text x="40" y="23" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>
  </g>

  <!-- AI sparkle elements -->
  <g fill="url(#dental-gradient)">
    <path d="M500 200 L503 208 L511 210 L503 212 L500 220 L497 212 L489 210 L497 208 Z" opacity="0.7"/>
    <path d="M520 260 L522 265 L527 267 L522 269 L520 274 L518 269 L513 267 L518 265 Z" opacity="0.5"/>
    <path d="M100 80 L102 86 L108 88 L102 90 L100 96 L98 90 L92 88 L98 86 Z" opacity="0.6"/>
    <path d="M480 320 L482 325 L487 327 L482 329 L480 334 L478 329 L473 327 L478 325 Z" opacity="0.5"/>
  </g>

  <!-- Floating status cards -->
  <g transform="translate(450, 200)">
    <rect x="0" y="0" width="100" height="45" rx="8" fill="white" opacity="0.08"/>
    <rect x="0" y="0" width="100" height="45" rx="8" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="18" cy="22" r="10" fill="#4ade80" opacity="0.3"/>
    <path d="M14 22 L17 25 L23 19" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="35" y="16" width="50" height="5" rx="1" fill="white" opacity="0.5"/>
    <rect x="35" y="26" width="35" height="4" rx="1" fill="white" opacity="0.3"/>
  </g>

  <g transform="translate(470, 260)">
    <rect x="0" y="0" width="90" height="40" rx="8" fill="white" opacity="0.06"/>
    <rect x="0" y="0" width="90" height="40" rx="8" stroke="white" stroke-width="1" fill="none" opacity="0.12"/>
    <rect x="12" y="12" width="40" height="5" rx="1" fill="white" opacity="0.4"/>
    <rect x="12" y="22" width="60" height="4" rx="1" fill="white" opacity="0.25"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="540" cy="380" r="8" fill="white" opacity="0.1"/>
  <circle cx="80" cy="320" r="10" fill="url(#dental-gradient)" opacity="0.2"/>
  <circle cx="140" cy="60" r="6" fill="white" opacity="0.15"/>
</svg>
