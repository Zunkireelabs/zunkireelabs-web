<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 32">
  <!-- Geometric triangles icon -->
  <g transform="translate(4, 4)">
    <!-- Row 1: 3 triangles pointing down -->
    <polygon points="6,0 12,10 0,10" fill="#555"/>
    <polygon points="12,0 18,10 6,10" fill="#777"/>
    <polygon points="18,0 24,10 12,10" fill="#555"/>
    <!-- Row 2: 3 triangles pointing up -->
    <polygon points="6,10 12,20 0,20" fill="#777"/>
    <polygon points="12,10 18,20 6,20" fill="#555"/>
    <polygon points="18,10 24,20 12,20" fill="#777"/>
  </g>
  <!-- Company name -->
  <text x="38" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#333">Corecloud365</text>
</svg>
