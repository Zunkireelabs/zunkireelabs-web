<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="commerce-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c"/>
      <stop offset="100%" style="stop-color:#eb1600"/>
    </linearGradient>
    <linearGradient id="commerce-grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c"/>
      <stop offset="100%" style="stop-color:#eb1600"/>
    </linearGradient>
  </defs>

  <!-- Main Container - Ecommerce Dashboard -->
  <g transform="translate(30, 35)">
    <rect x="0" y="0" width="540" height="330" rx="16" fill="white" opacity="0.07"/>
    <rect x="0" y="0" width="540" height="330" rx="16" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>

    <!-- Header Bar -->
    <rect x="0" y="0" width="540" height="50" rx="16" fill="white" opacity="0.05"/>
    <rect x="20" y="18" width="100" height="8" rx="2" fill="white" opacity="0.6"/>
    <rect x="20" y="30" width="60" height="5" rx="1" fill="white" opacity="0.3"/>

    <!-- Cart icon in header -->
    <g transform="translate(480, 15)">
      <rect x="0" y="0" width="40" height="24" rx="6" fill="url(#commerce-grad)" opacity="0.4"/>
      <g transform="translate(8, 4)">
        <path d="M2 2 L5 2 L8 14 L22 14 L24 6 L7 6" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
        <circle cx="10" cy="18" r="2" fill="white" opacity="0.9"/>
        <circle cx="20" cy="18" r="2" fill="white" opacity="0.9"/>
      </g>
    </g>

    <!-- Left Section: Product Cards -->
    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="200" height="255" rx="12" fill="white" opacity="0.04"/>
      <rect x="0" y="0" width="200" height="255" rx="12" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>

      <!-- Section title -->
      <rect x="12" y="12" width="70" height="6" rx="2" fill="white" opacity="0.5"/>

      <!-- Product Card 1 -->
      <g transform="translate(10, 30)">
        <rect x="0" y="0" width="180" height="65" rx="8" fill="white" opacity="0.08"/>
        <rect x="0" y="0" width="180" height="65" rx="8" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>

        <!-- Product image placeholder -->
        <rect x="8" y="8" width="50" height="50" rx="6" fill="url(#commerce-grad)" opacity="0.25"/>
        <rect x="18" y="20" width="30" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="18" y="28" width="20" height="4" rx="1" fill="white" opacity="0.3"/>

        <!-- Product info -->
        <rect x="66" y="12" width="80" height="6" rx="2" fill="white" opacity="0.6"/>
        <rect x="66" y="22" width="100" height="5" rx="1" fill="white" opacity="0.3"/>

        <!-- Price tag -->
        <rect x="66" y="38" width="50" height="18" rx="5" fill="url(#commerce-grad)" opacity="0.35"/>
        <rect x="74" y="44" width="30" height="6" rx="1" fill="white" opacity="0.8"/>

        <!-- Add to cart button -->
        <rect x="125" y="40" width="48" height="16" rx="4" fill="white" opacity="0.15"/>
        <rect x="133" y="46" width="32" height="4" rx="1" fill="white" opacity="0.5"/>
      </g>

      <!-- Product Card 2 -->
      <g transform="translate(10, 105)">
        <rect x="0" y="0" width="180" height="60" rx="8" fill="white" opacity="0.06"/>
        <rect x="8" y="8" width="45" height="45" rx="5" fill="url(#commerce-grad)" opacity="0.2"/>
        <rect x="60" y="12" width="70" height="5" rx="1" fill="white" opacity="0.5"/>
        <rect x="60" y="21" width="90" height="4" rx="1" fill="white" opacity="0.25"/>
        <rect x="60" y="36" width="45" height="15" rx="4" fill="url(#commerce-grad)" opacity="0.28"/>
        <rect x="68" y="41" width="28" height="5" rx="1" fill="white" opacity="0.7"/>
      </g>

      <!-- Product Card 3 -->
      <g transform="translate(10, 175)">
        <rect x="0" y="0" width="180" height="55" rx="8" fill="white" opacity="0.05"/>
        <rect x="8" y="8" width="40" height="40" rx="5" fill="url(#commerce-grad)" opacity="0.18"/>
        <rect x="55" y="12" width="65" height="5" rx="1" fill="white" opacity="0.45"/>
        <rect x="55" y="20" width="85" height="4" rx="1" fill="white" opacity="0.22"/>
        <rect x="55" y="34" width="40" height="14" rx="4" fill="url(#commerce-grad)" opacity="0.25"/>
      </g>
    </g>

    <!-- Center Section: AI Agent Chat -->
    <g transform="translate(225, 60)">
      <rect x="0" y="0" width="180" height="255" rx="12" fill="url(#commerce-grad)" opacity="0.08"/>
      <rect x="0" y="0" width="180" height="255" rx="12" stroke="url(#commerce-grad)" stroke-width="1.5" fill="none" opacity="0.3"/>

      <!-- AI Agent Header -->
      <g transform="translate(10, 10)">
        <circle cx="20" cy="20" r="18" fill="url(#commerce-grad)" opacity="0.5"/>
        <circle cx="20" cy="20" r="14" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
        <!-- AI sparkle -->
        <path d="M20 8 L22 16 L30 18 L22 20 L20 28 L18 20 L10 18 L18 16 Z" fill="white" opacity="0.85"/>

        <rect x="46" y="10" width="70" height="6" rx="2" fill="white" opacity="0.7"/>
        <rect x="46" y="20" width="90" height="4" rx="1" fill="white" opacity="0.4"/>

        <!-- Online indicator -->
        <circle cx="32" cy="32" r="5" fill="#4ade80" opacity="0.8"/>
      </g>

      <!-- Chat Messages -->
      <!-- User message -->
      <g transform="translate(50, 60)">
        <rect x="0" y="0" width="120" height="35" rx="12" fill="white" opacity="0.12"/>
        <rect x="10" y="10" width="80" height="5" rx="1" fill="white" opacity="0.6"/>
        <rect x="10" y="19" width="60" height="4" rx="1" fill="white" opacity="0.4"/>
      </g>

      <!-- AI Response with product suggestion -->
      <g transform="translate(10, 105)">
        <rect x="0" y="0" width="140" height="70" rx="12" fill="url(#commerce-grad)" opacity="0.2"/>
        <rect x="0" y="0" width="140" height="70" rx="12" stroke="url(#commerce-grad)" stroke-width="1" fill="none" opacity="0.4"/>

        <rect x="10" y="10" width="90" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="10" y="19" width="110" height="4" rx="1" fill="white" opacity="0.45"/>

        <!-- Product recommendation card -->
        <rect x="10" y="32" width="120" height="28" rx="6" fill="white" opacity="0.1"/>
        <rect x="16" y="38" width="20" height="16" rx="3" fill="url(#commerce-grad)" opacity="0.4"/>
        <rect x="42" y="40" width="50" height="4" rx="1" fill="white" opacity="0.6"/>
        <rect x="42" y="48" width="35" height="4" rx="1" fill="white" opacity="0.4"/>
        <rect x="98" y="42" width="26" height="10" rx="3" fill="url(#commerce-grad)" opacity="0.6"/>
      </g>

      <!-- User confirmation -->
      <g transform="translate(60, 185)">
        <rect x="0" y="0" width="110" height="28" rx="10" fill="white" opacity="0.1"/>
        <rect x="12" y="10" width="60" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="12" y="17" width="40" height="4" rx="1" fill="white" opacity="0.3"/>
      </g>

      <!-- Payment confirmation -->
      <g transform="translate(10, 220)">
        <rect x="0" y="0" width="130" height="28" rx="10" fill="#4ade80" opacity="0.2"/>
        <rect x="0" y="0" width="130" height="28" rx="10" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.4"/>
        <circle cx="18" cy="14" r="8" fill="#4ade80" opacity="0.5"/>
        <path d="M14 14 L17 17 L23 11" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="32" y="9" width="70" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="32" y="17" width="50" height="4" rx="1" fill="white" opacity="0.4"/>
      </g>
    </g>

    <!-- Right Section: Cart & Payment -->
    <g transform="translate(415, 60)">
      <rect x="0" y="0" width="110" height="255" rx="12" fill="white" opacity="0.04"/>
      <rect x="0" y="0" width="110" height="255" rx="12" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>

      <!-- Cart Header -->
      <rect x="10" y="10" width="40" height="5" rx="1" fill="white" opacity="0.5"/>
      <circle cx="90" cy="12" r="10" fill="url(#commerce-grad)" opacity="0.35"/>
      <text x="90" y="16" text-anchor="middle" fill="white" opacity="0.9" font-size="10" font-weight="600" font-family="system-ui">3</text>

      <!-- Cart Items -->
      <g transform="translate(8, 30)">
        <rect x="0" y="0" width="94" height="40" rx="6" fill="white" opacity="0.08"/>
        <rect x="6" y="6" width="28" height="28" rx="4" fill="url(#commerce-grad)" opacity="0.25"/>
        <rect x="40" y="10" width="45" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="40" y="18" width="30" height="4" rx="1" fill="white" opacity="0.3"/>
        <rect x="40" y="28" width="35" height="4" rx="1" fill="url(#commerce-grad)" opacity="0.5"/>
      </g>

      <g transform="translate(8, 78)">
        <rect x="0" y="0" width="94" height="35" rx="6" fill="white" opacity="0.06"/>
        <rect x="6" y="6" width="24" height="24" rx="3" fill="url(#commerce-grad)" opacity="0.2"/>
        <rect x="36" y="8" width="40" height="4" rx="1" fill="white" opacity="0.45"/>
        <rect x="36" y="15" width="28" height="4" rx="1" fill="white" opacity="0.25"/>
        <rect x="36" y="24" width="32" height="4" rx="1" fill="url(#commerce-grad)" opacity="0.4"/>
      </g>

      <g transform="translate(8, 120)">
        <rect x="0" y="0" width="94" height="32" rx="6" fill="white" opacity="0.05"/>
        <rect x="6" y="6" width="22" height="22" rx="3" fill="url(#commerce-grad)" opacity="0.18"/>
        <rect x="34" y="8" width="38" height="4" rx="1" fill="white" opacity="0.4"/>
        <rect x="34" y="15" width="25" height="4" rx="1" fill="white" opacity="0.22"/>
        <rect x="34" y="23" width="30" height="4" rx="1" fill="url(#commerce-grad)" opacity="0.35"/>
      </g>

      <!-- Divider -->
      <line x1="10" y1="165" x2="100" y2="165" stroke="white" stroke-width="1" opacity="0.15"/>

      <!-- Total -->
      <rect x="10" y="175" width="35" height="5" rx="1" fill="white" opacity="0.4"/>
      <rect x="10" y="185" width="55" height="8" rx="2" fill="white" opacity="0.7"/>

      <!-- Payment Methods -->
      <g transform="translate(8, 205)">
        <rect x="0" y="0" width="94" height="22" rx="6" fill="white" opacity="0.08"/>
        <rect x="6" y="6" width="25" height="10" rx="3" fill="#4ade80" opacity="0.4"/>
        <rect x="36" y="8" width="50" height="6" rx="1" fill="white" opacity="0.5"/>
      </g>

      <!-- Checkout Button -->
      <g transform="translate(8, 235)">
        <rect x="0" y="0" width="94" height="14" rx="5" fill="url(#commerce-grad)" opacity="0.7"/>
        <rect x="25" y="4" width="44" height="6" rx="1" fill="white" opacity="0.9"/>
      </g>
    </g>
  </g>

  <!-- Floating AI Insights Panel -->
  <g transform="translate(475, 310)">
    <rect x="0" y="0" width="110" height="55" rx="10" fill="white" opacity="0.1"/>
    <rect x="0" y="0" width="110" height="55" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>

    <!-- AI sparkle icon -->
    <g transform="translate(10, 10)">
      <path d="M10 0 L12 7 L19 9 L12 11 L10 18 L8 11 L1 9 L8 7 Z" fill="url(#commerce-grad)" opacity="0.8"/>
    </g>

    <rect x="35" y="10" width="60" height="5" rx="1" fill="white" opacity="0.55"/>
    <rect x="35" y="19" width="45" height="4" rx="1" fill="white" opacity="0.35"/>

    <!-- Conversion stat -->
    <rect x="12" y="34" width="45" height="14" rx="5" fill="url(#commerce-grad)" opacity="0.5"/>
    <rect x="18" y="39" width="30" height="5" rx="1" fill="white" opacity="0.85"/>

    <!-- Trend arrow up -->
    <g transform="translate(75, 36)">
      <path d="M0 8 L8 0 L16 8" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <line x1="8" y1="0" x2="8" y2="12" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>

  <!-- Decorative elements -->
  <circle cx="20" cy="85" r="4" fill="url(#commerce-grad)" opacity="0.3"/>
  <circle cx="585" cy="380" r="5" fill="white" opacity="0.08"/>

  <!-- AI sparkles -->
  <path d="M575 45 L577 51 L583 53 L577 55 L575 61 L573 55 L567 53 L573 51 Z" fill="url(#commerce-grad)" opacity="0.45"/>
  <path d="M30 365 L31 369 L35 370 L31 371 L30 375 L29 371 L25 370 L29 369 Z" fill="url(#commerce-grad)" opacity="0.35"/>
  <path d="M560 120 L562 126 L568 128 L562 130 L560 136 L558 130 L552 128 L558 126 Z" fill="white" opacity="0.25"/>
</svg>
