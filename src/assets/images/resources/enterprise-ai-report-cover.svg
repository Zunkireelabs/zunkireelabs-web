<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="enterprise-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="enterprise-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#enterprise-bg)"/>

  <!-- Grid pattern -->
  <g stroke="#fff" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Enterprise building icons -->
  <g transform="translate(80, 120)" opacity="0.15">
    <rect x="0" y="100" width="50" height="80" fill="#fff"/>
    <rect x="60" y="60" width="60" height="120" fill="#fff"/>
    <rect x="130" y="80" width="45" height="100" fill="#fff"/>
    <rect x="185" y="40" width="70" height="140" fill="#fff"/>
    <rect x="265" y="70" width="55" height="110" fill="#fff"/>
  </g>

  <!-- Trend line chart -->
  <g transform="translate(400, 100)">
    <!-- Chart background -->
    <rect width="320" height="180" fill="#fff" opacity="0.05" rx="8"/>

    <!-- Y-axis labels -->
    <text x="-10" y="30" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="end">100%</text>
    <text x="-10" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="end">50%</text>
    <text x="-10" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="end">0%</text>

    <!-- X-axis labels -->
    <text x="40" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">2023</text>
    <text x="120" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">2024</text>
    <text x="200" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">2025</text>
    <text x="280" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.5" text-anchor="middle">2026</text>

    <!-- Trend lines -->
    <polyline points="40,130 120,100 200,60 280,30" fill="none" stroke="url(#enterprise-accent)" stroke-width="3" stroke-linecap="round"/>
    <polyline points="40,140 120,125 200,105 280,80" fill="none" stroke="#fff" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

    <!-- Data points -->
    <circle cx="40" cy="130" r="5" fill="#818cf8"/>
    <circle cx="120" cy="100" r="5" fill="#818cf8"/>
    <circle cx="200" cy="60" r="5" fill="#818cf8"/>
    <circle cx="280" cy="30" r="6" fill="#818cf8" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Key stats -->
  <g transform="translate(80, 300)">
    <rect width="200" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="100" y="35" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">500+</text>
    <text x="100" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.6" text-anchor="middle">Tech Leaders Surveyed</text>
  </g>

  <g transform="translate(300, 300)">
    <rect width="150" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="75" y="35" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#818cf8" text-anchor="middle">78%</text>
    <text x="75" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.6" text-anchor="middle">Planning AI</text>
  </g>

  <g transform="translate(470, 300)">
    <rect width="150" height="80" fill="#fff" opacity="0.05" rx="8"/>
    <text x="75" y="35" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">2026</text>
    <text x="75" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#fff" opacity="0.6" text-anchor="middle">Report Year</text>
  </g>

  <!-- Title area -->
  <text x="80" y="80" font-family="system-ui, sans-serif" font-size="14" fill="#818cf8" font-weight="500">ENTERPRISE AI ADOPTION</text>

  <!-- Report badge -->
  <rect x="640, 60" width="100" height="35" fill="url(#enterprise-accent)" rx="4"/>
  <text x="690" y="83" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e1b4b" text-anchor="middle">REPORT</text>
</svg>