<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="edu-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="edu-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#edu-bg)"/>

  <!-- Abstract graduation cap -->
  <g transform="translate(550, 80)" opacity="0.1">
    <polygon points="80,0 160,40 80,80 0,40" fill="#fff"/>
    <rect x="60" y="80" width="40" height="60" fill="#fff"/>
    <line x1="160" y1="40" x2="180" y2="100" stroke="#fff" stroke-width="4"/>
    <circle cx="180" cy="110" r="10" fill="#fff"/>
  </g>

  <!-- Chat/inquiry visualization -->
  <g transform="translate(80, 100)">
    <!-- Student inquiry -->
    <g transform="translate(0, 0)">
      <rect width="280" height="50" fill="#fff" opacity="0.15" rx="8"/>
      <circle cx="30" cy="25" r="15" fill="#fff" opacity="0.3"/>
      <rect x="55" y="15" width="180" height="8" fill="#fff" opacity="0.4" rx="4"/>
      <rect x="55" y="30" width="140" height="6" fill="#fff" opacity="0.3" rx="3"/>
    </g>

    <!-- AI Response -->
    <g transform="translate(100, 70)">
      <rect width="320" height="70" fill="url(#edu-accent)" opacity="0.2" rx="8"/>
      <circle cx="30" cy="35" r="15" fill="url(#edu-accent)"/>
      <text x="30" y="40" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">AI</text>
      <rect x="55" y="20" width="220" height="8" fill="#fff" opacity="0.6" rx="4"/>
      <rect x="55" y="35" width="180" height="6" fill="#fff" opacity="0.4" rx="3"/>
      <rect x="55" y="48" width="200" height="6" fill="#fff" opacity="0.4" rx="3"/>
    </g>

    <!-- Another inquiry -->
    <g transform="translate(0, 160)">
      <rect width="260" height="45" fill="#fff" opacity="0.15" rx="8"/>
      <circle cx="30" cy="22" r="12" fill="#fff" opacity="0.3"/>
      <rect x="50" y="12" width="160" height="8" fill="#fff" opacity="0.4" rx="4"/>
      <rect x="50" y="26" width="120" height="6" fill="#fff" opacity="0.3" rx="3"/>
    </g>
  </g>

  <!-- Stats -->
  <g transform="translate(500, 200)">
    <g>
      <rect width="120" height="70" fill="#fff" opacity="0.1" rx="8"/>
      <text x="60" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">45%</text>
      <text x="60" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Faster Response</text>
    </g>

    <g transform="translate(140, 0)">
      <rect width="120" height="70" fill="#fff" opacity="0.1" rx="8"/>
      <text x="60" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">3x</text>
      <text x="60" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#fff" opacity="0.7" text-anchor="middle">Satisfaction</text>
    </g>

    <g transform="translate(0, 90)">
      <rect width="260" height="50" fill="#fff" opacity="0.1" rx="8"/>
      <text x="130" y="32" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">60% Less Manual Work</text>
    </g>
  </g>

  <!-- Company name -->
  <text x="80" y="380" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#fff">ADMIZZ EDUCATION</text>
  <text x="80" y="405" font-family="system-ui, sans-serif" font-size="14" fill="#fff" opacity="0.7">Student Inquiry Management</text>

  <!-- Case study badge -->
  <rect x="620" y="370" width="120" height="35" fill="url(#edu-accent)" rx="4"/>
  <text x="680" y="393" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a" text-anchor="middle">CASE STUDY</text>
</svg>