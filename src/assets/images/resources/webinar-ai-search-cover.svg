<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="webinar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="play-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EB1600"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#webinar-bg)"/>

  <!-- Video frame border -->
  <rect x="40" y="40" width="720" height="370" fill="none" stroke="#333" stroke-width="2" rx="8"/>

  <!-- Screen content area -->
  <rect x="50" y="50" width="700" height="350" fill="#1a1a1a" rx="4"/>

  <!-- Abstract presentation content -->
  <g transform="translate(80, 80)">
    <!-- Slide header bar -->
    <rect width="300" height="8" fill="#333" rx="4"/>

    <!-- Content lines -->
    <rect y="30" width="250" height="4" fill="#444" rx="2"/>
    <rect y="45" width="200" height="4" fill="#444" rx="2"/>
    <rect y="60" width="280" height="4" fill="#444" rx="2"/>

    <!-- Chart area -->
    <g transform="translate(0, 90)">
      <rect width="280" height="120" fill="#222" rx="4"/>
      <g transform="translate(20, 100)">
        <rect width="30" height="40" fill="#EB1600" opacity="0.6" rx="2"/>
        <rect x="45" width="30" height="60" fill="#EB1600" opacity="0.7" rx="2"/>
        <rect x="90" width="30" height="80" fill="#EB1600" opacity="0.8" rx="2"/>
        <rect x="135" width="30" height="55" fill="#EB1600" opacity="0.7" rx="2"/>
        <rect x="180" width="30" height="70" fill="#EB1600" opacity="0.75" rx="2"/>
      </g>
    </g>
  </g>

  <!-- Speaker video area -->
  <g transform="translate(450, 80)">
    <rect width="280" height="200" fill="#252525" rx="4"/>
    <!-- Speaker silhouette -->
    <circle cx="140" cy="70" r="35" fill="#333"/>
    <ellipse cx="140" cy="160" rx="60" ry="45" fill="#333"/>
    <!-- Camera indicator -->
    <circle cx="250" cy="20" r="6" fill="#EB1600">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Play button overlay -->
  <g transform="translate(400, 225)">
    <circle r="50" fill="url(#play-gradient)" opacity="0.9"/>
    <polygon points="18,-20 18,20 -12,0" fill="#fff" transform="translate(5, 0)"/>
  </g>

  <!-- Timeline bar -->
  <g transform="translate(50, 370)">
    <rect width="700" height="4" fill="#333" rx="2"/>
    <rect width="280" height="4" fill="#EB1600" rx="2"/>
    <circle cx="280" cy="2" r="8" fill="#fff"/>
  </g>

  <!-- Duration badge -->
  <rect x="650" y="320" width="80" height="30" fill="#000" opacity="0.7" rx="4"/>
  <text x="690" y="340" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">45:00</text>

  <!-- On Demand label -->
  <rect x="60" y="60" width="100" height="24" fill="#EB1600" rx="4"/>
  <text x="110" y="77" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">ON DEMAND</text>
</svg>