<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="nepali-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="nepali-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#nepali-bg)"/>

  <!-- Abstract neural network -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.1">
    <circle cx="150" cy="120" r="30" fill="none"/>
    <circle cx="280" cy="80" r="25" fill="none"/>
    <circle cx="400" cy="100" r="35" fill="none"/>
    <circle cx="520" cy="70" r="20" fill="none"/>
    <circle cx="650" cy="110" r="28" fill="none"/>
    <line x1="150" y1="120" x2="280" y2="80"/>
    <line x1="280" y1="80" x2="400" y2="100"/>
    <line x1="400" y1="100" x2="520" y2="70"/>
    <line x1="520" y1="70" x2="650" y2="110"/>
  </g>

  <!-- Devanagari script showcase -->
  <g transform="translate(100, 160)">
    <text font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#fff" opacity="0.15">
      नेपाली
    </text>
  </g>

  <!-- AI processing visualization -->
  <g transform="translate(100, 280)">
    <!-- Input box -->
    <rect width="250" height="60" fill="#fff" opacity="0.1" rx="8"/>
    <text x="20" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">INPUT</text>
    <text x="20" y="45" font-family="system-ui, sans-serif" font-size="16" fill="#fff">"के हो यो?"</text>

    <!-- Arrow -->
    <g transform="translate(270, 20)">
      <line x1="0" y1="15" x2="50" y2="15" stroke="url(#nepali-accent)" stroke-width="3"/>
      <polygon points="50,15 40,8 40,22" fill="url(#nepali-accent)"/>
    </g>

    <!-- Processing box -->
    <g transform="translate(340, 0)">
      <rect width="120" height="60" fill="#fff" opacity="0.15" rx="8" stroke="#a78bfa" stroke-width="2"/>
      <text x="60" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">NLP</text>
      <text x="60" y="45" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Processing</text>
    </g>

    <!-- Arrow -->
    <g transform="translate(480, 20)">
      <line x1="0" y1="15" x2="50" y2="15" stroke="url(#nepali-accent)" stroke-width="3"/>
      <polygon points="50,15 40,8 40,22" fill="url(#nepali-accent)"/>
    </g>

    <!-- Output box -->
    <g transform="translate(550, 0)">
      <rect width="180" height="60" fill="#fff" opacity="0.1" rx="8"/>
      <text x="20" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.7">OUTPUT</text>
      <text x="20" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#fff">"What is this?"</text>
    </g>
  </g>

  <!-- Feature tags -->
  <g transform="translate(100, 380)">
    <rect width="100" height="30" fill="#fff" opacity="0.1" rx="15"/>
    <text x="50" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Devanagari</text>
  </g>

  <g transform="translate(220, 380)">
    <rect width="120" height="30" fill="#fff" opacity="0.1" rx="15"/>
    <text x="60" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Code-switching</text>
  </g>

  <g transform="translate(360, 380)">
    <rect width="80" height="30" fill="#fff" opacity="0.1" rx="15"/>
    <text x="40" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Chatbot</text>
  </g>

  <g transform="translate(460, 380)">
    <rect width="70" height="30" fill="#fff" opacity="0.1" rx="15"/>
    <text x="35" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">Search</text>
  </g>

  <!-- Guide badge -->
  <rect x="640" y="60" width="110" height="35" fill="url(#nepali-accent)" rx="4"/>
  <text x="695" y="83" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#5b21b6" text-anchor="middle">TECH GUIDE</text>
</svg>