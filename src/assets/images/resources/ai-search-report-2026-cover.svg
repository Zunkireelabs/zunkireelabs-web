<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="search-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="search-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EB1600"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#search-bg)"/>

  <!-- Abstract network pattern -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.1">
    <circle cx="200" cy="100" r="60" fill="none"/>
    <circle cx="350" cy="200" r="80" fill="none"/>
    <circle cx="500" cy="120" r="50" fill="none"/>
    <circle cx="600" cy="250" r="70" fill="none"/>
    <circle cx="150" cy="300" r="40" fill="none"/>
    <line x1="200" y1="100" x2="350" y2="200"/>
    <line x1="350" y1="200" x2="500" y2="120"/>
    <line x1="500" y1="120" x2="600" y2="250"/>
    <line x1="150" y1="300" x2="350" y2="200"/>
  </g>

  <!-- Search icon large -->
  <g transform="translate(300, 150)" opacity="0.15">
    <circle cx="80" cy="80" r="60" fill="none" stroke="#fff" stroke-width="8"/>
    <line x1="125" y1="125" x2="170" y2="170" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- AI brain pattern -->
  <g transform="translate(500, 200)" fill="none" stroke="#EB1600" stroke-width="1.5" opacity="0.4">
    <ellipse cx="60" cy="40" rx="50" ry="35"/>
    <path d="M30 40 Q45 25 60 40 Q75 55 90 40"/>
    <path d="M40 55 Q60 70 80 55"/>
    <circle cx="45" cy="35" r="4" fill="#EB1600"/>
    <circle cx="75" cy="35" r="4" fill="#EB1600"/>
  </g>

  <!-- Data flow lines -->
  <g stroke="url(#search-accent)" stroke-width="2" fill="none" opacity="0.5">
    <path d="M50 350 Q200 280 350 350 Q500 420 650 350 Q750 300 800 330"/>
    <path d="M0 380 Q150 320 300 380 Q450 440 600 380 Q700 340 800 360"/>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(80, 280)">
    <rect width="120" height="70" fill="#fff" opacity="0.05" rx="4"/>
    <text x="60" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">340%</text>
    <text x="60" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.6" text-anchor="middle">Average ROI</text>
  </g>

  <g transform="translate(220, 280)">
    <rect width="120" height="70" fill="#fff" opacity="0.05" rx="4"/>
    <text x="60" y="35" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">45%</text>
    <text x="60" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#fff" opacity="0.6" text-anchor="middle">Less Support</text>
  </g>

  <!-- Floating elements -->
  <g fill="#EB1600" opacity="0.6">
    <circle cx="700" cy="80" r="6"/>
    <circle cx="720" cy="120" r="4"/>
    <circle cx="680" cy="140" r="5"/>
    <circle cx="740" cy="160" r="3"/>
  </g>

  <!-- Year badge -->
  <rect x="650" y="360" width="100" height="40" fill="url(#search-accent)" rx="4"/>
  <text x="700" y="385" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff" text-anchor="middle">2026</text>
</svg>