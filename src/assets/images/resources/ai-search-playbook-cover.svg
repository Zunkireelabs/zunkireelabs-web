<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="playbook-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#playbook-bg)"/>

  <!-- Code editor window -->
  <g transform="translate(80, 60)">
    <!-- Window frame -->
    <rect width="640" height="330" fill="#0d1117" rx="8" stroke="#30363d" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="640" height="35" fill="#161b22" rx="8"/>
    <rect y="27" width="640" height="8" fill="#161b22"/>

    <!-- Window buttons -->
    <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="17" r="6" fill="#27ca40"/>

    <!-- Tab -->
    <rect x="100" y="8" width="120" height="27" fill="#0d1117" rx="4"/>
    <text x="160" y="26" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">search.ts</text>

    <!-- Line numbers -->
    <g font-family="monospace" font-size="13" fill="#484f58">
      <text x="20" y="70">1</text>
      <text x="20" y="90">2</text>
      <text x="20" y="110">3</text>
      <text x="20" y="130">4</text>
      <text x="20" y="150">5</text>
      <text x="20" y="170">6</text>
      <text x="20" y="190">7</text>
      <text x="20" y="210">8</text>
      <text x="20" y="230">9</text>
      <text x="20" y="250">10</text>
      <text x="15" y="270">11</text>
      <text x="15" y="290">12</text>
    </g>

    <!-- Code content -->
    <g font-family="monospace" font-size="13">
      <text x="50" y="70"><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> { ZunkireeSearch } </tspan><tspan fill="#ff7b72">from</tspan><tspan fill="#a5d6ff"> '@zunkiree/sdk'</tspan></text>
      <text x="50" y="90" fill="#484f58">// Initialize AI search</text>
      <text x="50" y="110"><tspan fill="#ff7b72">const</tspan><tspan fill="#c9d1d9"> search = </tspan><tspan fill="#ff7b72">new</tspan><tspan fill="#d2a8ff"> ZunkireeSearch</tspan><tspan fill="#c9d1d9">({</tspan></text>
      <text x="50" y="130"><tspan fill="#c9d1d9">  apiKey: </tspan><tspan fill="#a5d6ff">'your-api-key'</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text x="50" y="150"><tspan fill="#c9d1d9">  index: </tspan><tspan fill="#a5d6ff">'products'</tspan></text>
      <text x="50" y="170" fill="#c9d1d9">});</text>
      <text x="50" y="190" fill="#c9d1d9"></text>
      <text x="50" y="210"><tspan fill="#ff7b72">const</tspan><tspan fill="#c9d1d9"> results = </tspan><tspan fill="#ff7b72">await</tspan><tspan fill="#c9d1d9"> search.</tspan><tspan fill="#d2a8ff">query</tspan><tspan fill="#c9d1d9">({</tspan></text>
      <text x="50" y="230"><tspan fill="#c9d1d9">  question: </tspan><tspan fill="#a5d6ff">"Find laptops under $1000"</tspan><tspan fill="#c9d1d9">,</tspan></text>
      <text x="50" y="250"><tspan fill="#c9d1d9">  limit: </tspan><tspan fill="#79c0ff">10</tspan></text>
      <text x="50" y="270" fill="#c9d1d9">});</text>
      <text x="50" y="290" fill="#484f58">// Returns AI-powered results</text>
    </g>

    <!-- Cursor blink -->
    <rect x="340" y="277" width="2" height="16" fill="#EB1600">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Playbook badge -->
  <rect x="620" y="30" width="140" height="35" fill="#EB1600" rx="4"/>
  <text x="690" y="53" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">PLAYBOOK</text>
</svg>