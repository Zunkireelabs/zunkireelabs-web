<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="zunkireeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b5c"/>
      <stop offset="100%" stop-color="#eb1600"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.15">
    <line x1="100" y1="0" x2="100" y2="400" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="600" y2="100" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#d1d5db" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#d1d5db" stroke-width="0.5"/>
  </g>

  <!-- Connection lines (behind agents) -->
  <g stroke="url(#zunkireeGradient)" stroke-width="2" stroke-dasharray="6 4" opacity="0.5">
    <!-- Manager to Workers -->
    <line x1="300" y1="130" x2="150" y2="240"/>
    <line x1="300" y1="130" x2="300" y2="240"/>
    <line x1="300" y1="130" x2="450" y2="240"/>
    <!-- Workers to Output -->
    <line x1="150" y1="290" x2="300" y2="350"/>
    <line x1="300" y1="290" x2="300" y2="350"/>
    <line x1="450" y1="290" x2="300" y2="350"/>
  </g>

  <!-- Flow arrows on connections -->
  <g fill="url(#zunkireeGradient)" filter="url(#glow)">
    <circle cx="225" cy="185" r="4"/>
    <circle cx="300" cy="185" r="4"/>
    <circle cx="375" cy="185" r="4"/>
    <circle cx="225" cy="320" r="4"/>
    <circle cx="300" cy="320" r="4"/>
    <circle cx="375" cy="320" r="4"/>
  </g>

  <!-- Manager Agent (top) -->
  <g filter="url(#shadow)">
    <rect x="200" y="50" width="200" height="80" rx="12" fill="#fff" stroke="url(#zunkireeGradient)" stroke-width="2"/>
    <rect x="210" y="60" width="180" height="60" rx="8" fill="#fafafa"/>

    <!-- Manager icon -->
    <circle cx="240" cy="90" r="15" fill="url(#zunkireeGradient)" opacity="0.15"/>
    <circle cx="240" cy="90" r="10" stroke="url(#zunkireeGradient)" stroke-width="2" fill="none"/>
    <circle cx="240" cy="86" r="3" fill="url(#zunkireeGradient)"/>
    <path d="M233 96 Q240 92 247 96" stroke="url(#zunkireeGradient)" stroke-width="2" fill="none"/>

    <!-- Manager text -->
    <text x="265" y="85" fill="#111827" font-family="system-ui, sans-serif" font-size="11" font-weight="600">MANAGER</text>
    <text x="265" y="100" fill="#6b7280" font-family="system-ui, sans-serif" font-size="9">Orchestrating agents...</text>
  </g>

  <!-- Worker Agent 1 (left) -->
  <g filter="url(#shadow)">
    <rect x="70" y="220" width="160" height="70" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="78" y="228" width="144" height="54" rx="6" fill="#fafafa"/>

    <!-- Worker 1 icon -->
    <circle cx="103" cy="255" r="12" fill="url(#zunkireeGradient)" opacity="0.12"/>
    <rect x="97" y="249" width="12" height="12" rx="2" stroke="url(#zunkireeGradient)" stroke-width="1.5" fill="none"/>

    <!-- Worker 1 text -->
    <text x="122" y="252" fill="#111827" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Data Agent</text>
    <text x="122" y="265" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="8">Processing query</text>

    <!-- Progress bar -->
    <rect x="122" y="272" width="80" height="4" rx="2" fill="#e5e7eb"/>
    <rect x="122" y="272" width="55" height="4" rx="2" fill="url(#zunkireeGradient)"/>
  </g>

  <!-- Worker Agent 2 (center) -->
  <g filter="url(#shadow)">
    <rect x="220" y="220" width="160" height="70" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="228" y="228" width="144" height="54" rx="6" fill="#fafafa"/>

    <!-- Worker 2 icon -->
    <circle cx="253" cy="255" r="12" fill="url(#zunkireeGradient)" opacity="0.12"/>
    <path d="M247 255 L253 249 L259 255 L253 261 Z" stroke="url(#zunkireeGradient)" stroke-width="1.5" fill="none"/>

    <!-- Worker 2 text -->
    <text x="272" y="252" fill="#111827" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Logic Agent</text>
    <text x="272" y="265" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="8">Reasoning...</text>

    <!-- Activity indicator -->
    <circle cx="340" cy="240" r="4" fill="#22c55e"/>
    <circle cx="340" cy="240" r="6" stroke="#22c55e" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Worker Agent 3 (right) -->
  <g filter="url(#shadow)">
    <rect x="370" y="220" width="160" height="70" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="378" y="228" width="144" height="54" rx="6" fill="#fafafa"/>

    <!-- Worker 3 icon -->
    <circle cx="403" cy="255" r="12" fill="url(#zunkireeGradient)" opacity="0.12"/>
    <circle cx="403" cy="255" r="6" stroke="url(#zunkireeGradient)" stroke-width="1.5" fill="none"/>
    <circle cx="403" cy="255" r="2" fill="url(#zunkireeGradient)"/>

    <!-- Worker 3 text -->
    <text x="422" y="252" fill="#111827" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Action Agent</text>
    <text x="422" y="265" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="8">Executing task</text>

    <!-- Checkmarks -->
    <g fill="#22c55e" font-family="system-ui, sans-serif" font-size="8">
      <text x="422" y="276">✓ Step 1</text>
      <text x="462" y="276">✓ Step 2</text>
    </g>
  </g>

  <!-- Output/Result (bottom) -->
  <g filter="url(#shadow)">
    <rect x="220" y="330" width="160" height="50" rx="10" fill="#fff" stroke="url(#zunkireeGradient)" stroke-width="2"/>
    <rect x="228" y="338" width="144" height="34" rx="6" fill="url(#zunkireeGradient)" opacity="0.08"/>

    <!-- Output icon -->
    <circle cx="253" cy="355" r="10" fill="url(#zunkireeGradient)" opacity="0.2"/>
    <path d="M249 355 L252 358 L258 352" stroke="url(#zunkireeGradient)" stroke-width="2" fill="none"/>

    <!-- Output text -->
    <text x="270" y="352" fill="#111827" font-family="system-ui, sans-serif" font-size="10" font-weight="600">OUTCOME</text>
    <text x="270" y="364" fill="url(#zunkireeGradient)" font-family="system-ui, sans-serif" font-size="8">Delivered autonomously</text>
  </g>

  <!-- Floating elements for depth -->
  <g opacity="0.5">
    <circle cx="50" cy="80" r="3" fill="url(#zunkireeGradient)"/>
    <circle cx="550" cy="120" r="2" fill="url(#zunkireeGradient)"/>
    <circle cx="80" cy="350" r="2" fill="#d1d5db"/>
    <circle cx="520" cy="340" r="3" fill="#d1d5db"/>
    <circle cx="540" cy="60" r="2" fill="#d1d5db"/>
  </g>

  <!-- GaaS label -->
  <g>
    <rect x="24" y="16" width="60" height="24" rx="12" fill="url(#zunkireeGradient)" opacity="0.12"/>
    <text x="54" y="33" fill="url(#zunkireeGradient)" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">GaaS</text>
  </g>
</svg>
