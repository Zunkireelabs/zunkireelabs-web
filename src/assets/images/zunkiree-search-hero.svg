<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eb1600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.5" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background grid pattern (subtle) -->
  <g opacity="0.1">
    <line x1="100" y1="0" x2="100" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Connection lines (data flow) -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.3">
    <!-- Lines connecting data sources to central hub -->
    <line x1="150" y1="120" x2="380" y2="220"/>
    <line x1="120" y1="280" x2="380" y2="250"/>
    <line x1="180" y1="400" x2="380" y2="280"/>
    <line x1="680" y1="100" x2="480" y2="220"/>
    <line x1="720" y1="300" x2="480" y2="260"/>
    <line x1="650" y1="420" x2="480" y2="280"/>
  </g>

  <!-- Data source nodes (left side) -->
  <g>
    <!-- Database icon -->
    <g transform="translate(120, 100)">
      <ellipse cx="30" cy="8" rx="25" ry="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <path d="M5 8 L5 35 C5 43 55 43 55 35 L55 8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <ellipse cx="30" cy="22" rx="25" ry="8" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.5"/>
    </g>

    <!-- Document icon -->
    <g transform="translate(90, 250)">
      <rect x="5" y="5" width="40" height="50" rx="3" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <line x1="15" y1="20" x2="35" y2="20" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
      <line x1="15" y1="30" x2="35" y2="30" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
      <line x1="15" y1="40" x2="28" y2="40" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- API icon -->
    <g transform="translate(150, 370)">
      <rect x="0" y="0" width="50" height="50" rx="8" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <text x="25" y="32" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="12" font-weight="600">API</text>
    </g>
  </g>

  <!-- Central AI Search Hub -->
  <g transform="translate(430, 250)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" stroke="url(#redGradient)" stroke-width="2" fill="none" opacity="0.4"/>

    <!-- Middle ring -->
    <circle cx="0" cy="0" r="60" stroke="url(#redGradient)" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- Inner circle with search icon -->
    <circle cx="0" cy="0" r="40" fill="url(#redGradient)" opacity="0.15"/>
    <circle cx="0" cy="0" r="40" stroke="url(#redGradient)" stroke-width="2" fill="none"/>

    <!-- Search magnifying glass -->
    <g transform="translate(-15, -15)">
      <circle cx="14" cy="14" r="10" stroke="#ffffff" stroke-width="2.5" fill="none"/>
      <line x1="22" y1="22" x2="30" y2="30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- AI pulse rings (animated feel) -->
    <circle cx="0" cy="0" r="90" stroke="#eb1600" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="100" stroke="#eb1600" stroke-width="0.5" fill="none" opacity="0.1"/>
  </g>

  <!-- Data source nodes (right side) -->
  <g>
    <!-- Cloud icon -->
    <g transform="translate(650, 80)">
      <path d="M15 35 C5 35 0 28 0 22 C0 14 8 8 18 10 C20 4 28 0 38 0 C50 0 60 10 60 22 C60 28 55 35 45 35 Z"
            stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Knowledge base icon -->
    <g transform="translate(690, 270)">
      <rect x="0" y="10" width="45" height="35" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <rect x="5" y="5" width="45" height="35" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
      <rect x="10" y="0" width="45" height="35" rx="2" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Chat/support icon -->
    <g transform="translate(620, 390)">
      <path d="M5 5 L45 5 C50 5 55 10 55 15 L55 35 C55 40 50 45 45 45 L20 45 L10 55 L10 45 L5 45 C0 45 -5 40 -5 35 L-5 15 C-5 10 0 5 5 5 Z"
            stroke="#60a5fa" stroke-width="1.5" fill="none" transform="translate(5,0)"/>
      <circle cx="20" cy="25" r="3" fill="#60a5fa" opacity="0.6"/>
      <circle cx="32" cy="25" r="3" fill="#60a5fa" opacity="0.6"/>
      <circle cx="44" cy="25" r="3" fill="#60a5fa" opacity="0.6"/>
    </g>
  </g>

  <!-- Output: Answer card -->
  <g transform="translate(520, 140)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#ffffff" opacity="0.1"/>
    <rect x="0" y="0" width="180" height="80" rx="8" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Answer indicator -->
    <circle cx="20" cy="20" r="6" fill="url(#redGradient)"/>
    <text x="35" y="24" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Direct Answer</text>

    <!-- Answer lines -->
    <rect x="15" y="38" width="150" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
    <rect x="15" y="52" width="120" height="6" rx="3" fill="#ffffff" opacity="0.3"/>
    <rect x="15" y="66" width="80" height="6" rx="3" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Natural language query bubble -->
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#ffffff" opacity="0.1"/>
    <rect x="0" y="0" width="200" height="50" rx="25" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Query text representation -->
    <text x="20" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" opacity="0.8">"Show me orders from..."</text>

    <!-- Cursor blink -->
    <rect x="165" y="18" width="2" height="16" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Speed indicator -->
  <g transform="translate(540, 350)">
    <text x="0" y="0" fill="url(#redGradient)" font-family="system-ui, sans-serif" font-size="24" font-weight="700">100ms</text>
    <text x="0" y="18" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">response time</text>
  </g>

  <!-- Decorative particles -->
  <g fill="#ffffff">
    <circle cx="200" cy="180" r="2" opacity="0.4"/>
    <circle cx="600" cy="200" r="2" opacity="0.3"/>
    <circle cx="350" cy="380" r="1.5" opacity="0.3"/>
    <circle cx="550" cy="420" r="2" opacity="0.4"/>
    <circle cx="250" cy="320" r="1.5" opacity="0.2"/>
    <circle cx="700" cy="180" r="1.5" opacity="0.3"/>
  </g>

  <!-- Accent dots with brand color -->
  <g fill="url(#redGradient)">
    <circle cx="380" cy="220" r="4" opacity="0.8"/>
    <circle cx="480" cy="220" r="4" opacity="0.8"/>
    <circle cx="380" cy="280" r="4" opacity="0.8"/>
    <circle cx="480" cy="280" r="4" opacity="0.8"/>
  </g>
</svg>
