<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3139"/>
      <stop offset="100%" style="stop-color:#0f1f24"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="473" x2="1200" y2="473" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Logo circle -->
  <circle cx="600" cy="250" r="60" fill="#eb1600"/>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white">Z</text>

  <!-- Company name -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="white">Zunkiree Labs</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">AI-Native Software for Business</text>

  <!-- Accent lines -->
  <rect x="500" y="480" width="200" height="4" fill="#eb1600" rx="2"/>
</svg>
