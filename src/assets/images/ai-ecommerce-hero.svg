<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="ecom-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c"/>
      <stop offset="100%" style="stop-color:#eb1600"/>
    </linearGradient>
  </defs>

  <!-- Main Container -->
  <g transform="translate(35, 40)">
    <rect x="0" y="0" width="530" height="320" rx="14" fill="white" opacity="0.07"/>
    <rect x="0" y="0" width="530" height="320" rx="14" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>

    <!-- Header -->
    <rect x="0" y="0" width="530" height="45" rx="14" fill="white" opacity="0.05"/>
    <rect x="18" y="14" width="90" height="7" rx="2" fill="white" opacity="0.6"/>
    <rect x="18" y="25" width="55" height="5" rx="1" fill="white" opacity="0.3"/>

    <!-- Search bar in header -->
    <g transform="translate(300, 10)">
      <rect x="0" y="0" width="150" height="26" rx="13" fill="white" opacity="0.1"/>
      <rect x="0" y="0" width="150" height="26" rx="13" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>
      <circle cx="20" cy="13" r="6" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
      <line x1="24" y1="17" x2="28" y2="21" stroke="white" stroke-width="1.5" opacity="0.5"/>
      <rect x="36" y="10" width="80" height="5" rx="1" fill="white" opacity="0.35"/>
    </g>

    <!-- Left: Store Products Grid -->
    <g transform="translate(12, 55)">
      <rect x="0" y="0" width="230" height="255" rx="10" fill="white" opacity="0.04"/>
      <rect x="0" y="0" width="230" height="255" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>

      <!-- Grid title -->
      <rect x="12" y="10" width="60" height="5" rx="1" fill="white" opacity="0.5"/>

      <!-- Product Grid 2x2 -->
      <!-- Product 1 -->
      <g transform="translate(10, 25)">
        <rect x="0" y="0" width="100" height="105" rx="8" fill="white" opacity="0.07"/>
        <rect x="8" y="8" width="84" height="55" rx="5" fill="url(#ecom-grad)" opacity="0.2"/>
        <rect x="28" y="25" width="44" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="35" y="32" width="30" height="4" rx="1" fill="white" opacity="0.3"/>
        <rect x="8" y="70" width="55" height="5" rx="1" fill="white" opacity="0.55"/>
        <rect x="8" y="80" width="70" height="4" rx="1" fill="white" opacity="0.3"/>
        <rect x="8" y="92" width="40" height="8" rx="3" fill="url(#ecom-grad)" opacity="0.4"/>
      </g>

      <!-- Product 2 -->
      <g transform="translate(120, 25)">
        <rect x="0" y="0" width="100" height="105" rx="8" fill="white" opacity="0.07"/>
        <rect x="8" y="8" width="84" height="55" rx="5" fill="url(#ecom-grad)" opacity="0.18"/>
        <rect x="25" y="28" width="50" height="4" rx="1" fill="white" opacity="0.45"/>
        <rect x="8" y="70" width="50" height="5" rx="1" fill="white" opacity="0.5"/>
        <rect x="8" y="80" width="65" height="4" rx="1" fill="white" opacity="0.28"/>
        <rect x="8" y="92" width="38" height="8" rx="3" fill="url(#ecom-grad)" opacity="0.35"/>
      </g>

      <!-- Product 3 -->
      <g transform="translate(10, 140)">
        <rect x="0" y="0" width="100" height="100" rx="8" fill="white" opacity="0.06"/>
        <rect x="8" y="8" width="84" height="50" rx="5" fill="url(#ecom-grad)" opacity="0.15"/>
        <rect x="8" y="65" width="48" height="5" rx="1" fill="white" opacity="0.48"/>
        <rect x="8" y="75" width="60" height="4" rx="1" fill="white" opacity="0.25"/>
        <rect x="8" y="86" width="35" height="7" rx="3" fill="url(#ecom-grad)" opacity="0.32"/>
      </g>

      <!-- Product 4 -->
      <g transform="translate(120, 140)">
        <rect x="0" y="0" width="100" height="100" rx="8" fill="white" opacity="0.06"/>
        <rect x="8" y="8" width="84" height="50" rx="5" fill="url(#ecom-grad)" opacity="0.15"/>
        <rect x="8" y="65" width="45" height="5" rx="1" fill="white" opacity="0.45"/>
        <rect x="8" y="75" width="58" height="4" rx="1" fill="white" opacity="0.23"/>
        <rect x="8" y="86" width="33" height="7" rx="3" fill="url(#ecom-grad)" opacity="0.3"/>
      </g>
    </g>

    <!-- Center: AI Chatbot Interface -->
    <g transform="translate(252, 55)">
      <rect x="0" y="0" width="160" height="255" rx="10" fill="url(#ecom-grad)" opacity="0.08"/>
      <rect x="0" y="0" width="160" height="255" rx="10" stroke="url(#ecom-grad)" stroke-width="1.5" fill="none" opacity="0.35"/>

      <!-- AI Avatar -->
      <g transform="translate(55, 8)">
        <circle cx="25" cy="25" r="22" fill="url(#ecom-grad)" opacity="0.45"/>
        <circle cx="25" cy="25" r="18" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
        <path d="M25 10 L28 21 L39 24 L28 27 L25 38 L22 27 L11 24 L22 21 Z" fill="white" opacity="0.9"/>
      </g>

      <!-- Online status -->
      <circle cx="97" cy="48" r="5" fill="#4ade80" opacity="0.85"/>

      <!-- Chat title -->
      <rect x="12" y="60" width="80" height="5" rx="1" fill="white" opacity="0.6"/>
      <rect x="12" y="68" width="50" height="4" rx="1" fill="white" opacity="0.35"/>

      <!-- User query -->
      <g transform="translate(35, 85)">
        <rect x="0" y="0" width="115" height="30" rx="10" fill="white" opacity="0.12"/>
        <rect x="10" y="8" width="75" height="5" rx="1" fill="white" opacity="0.6"/>
        <rect x="10" y="17" width="55" height="4" rx="1" fill="white" opacity="0.4"/>
      </g>

      <!-- AI response with recommendations -->
      <g transform="translate(10, 125)">
        <rect x="0" y="0" width="130" height="80" rx="10" fill="url(#ecom-grad)" opacity="0.22"/>
        <rect x="0" y="0" width="130" height="80" rx="10" stroke="url(#ecom-grad)" stroke-width="1" fill="none" opacity="0.4"/>

        <rect x="10" y="10" width="85" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="10" y="19" width="100" height="4" rx="1" fill="white" opacity="0.45"/>

        <!-- Product cards -->
        <rect x="10" y="32" width="52" height="38" rx="5" fill="white" opacity="0.12"/>
        <rect x="14" y="36" width="44" height="18" rx="3" fill="url(#ecom-grad)" opacity="0.3"/>
        <rect x="14" y="58" width="30" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="14" y="64" width="22" height="3" rx="1" fill="white" opacity="0.35"/>

        <rect x="68" y="32" width="52" height="38" rx="5" fill="white" opacity="0.1"/>
        <rect x="72" y="36" width="44" height="18" rx="3" fill="url(#ecom-grad)" opacity="0.25"/>
        <rect x="72" y="58" width="28" height="4" rx="1" fill="white" opacity="0.45"/>
        <rect x="72" y="64" width="20" height="3" rx="1" fill="white" opacity="0.3"/>
      </g>

      <!-- Order confirmation -->
      <g transform="translate(10, 215)">
        <rect x="0" y="0" width="140" height="30" rx="8" fill="#4ade80" opacity="0.2"/>
        <rect x="0" y="0" width="140" height="30" rx="8" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.4"/>
        <circle cx="18" cy="15" r="8" fill="#4ade80" opacity="0.5"/>
        <path d="M14 15 L17 18 L23 12" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="32" y="10" width="75" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="32" y="18" width="55" height="4" rx="1" fill="white" opacity="0.4"/>
      </g>
    </g>

    <!-- Right: Payment & Analytics -->
    <g transform="translate(422, 55)">
      <rect x="0" y="0" width="96" height="255" rx="10" fill="white" opacity="0.04"/>
      <rect x="0" y="0" width="96" height="255" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.1"/>

      <!-- Payment header -->
      <rect x="10" y="10" width="50" height="5" rx="1" fill="white" opacity="0.5"/>

      <!-- Payment method: eSewa -->
      <g transform="translate(8, 25)">
        <rect x="0" y="0" width="80" height="28" rx="6" fill="#4ade80" opacity="0.15"/>
        <rect x="0" y="0" width="80" height="28" rx="6" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.3"/>
        <rect x="8" y="8" width="28" height="12" rx="3" fill="#4ade80" opacity="0.5"/>
        <rect x="42" y="10" width="30" height="4" rx="1" fill="white" opacity="0.6"/>
        <rect x="42" y="17" width="22" height="3" rx="1" fill="white" opacity="0.35"/>
      </g>

      <!-- Payment method: Khalti -->
      <g transform="translate(8, 60)">
        <rect x="0" y="0" width="80" height="28" rx="6" fill="white" opacity="0.08"/>
        <rect x="8" y="8" width="28" height="12" rx="3" fill="#9333ea" opacity="0.4"/>
        <rect x="42" y="10" width="28" height="4" rx="1" fill="white" opacity="0.5"/>
        <rect x="42" y="17" width="20" height="3" rx="1" fill="white" opacity="0.3"/>
      </g>

      <!-- Divider -->
      <line x1="10" y1="100" x2="86" y2="100" stroke="white" stroke-width="1" opacity="0.15"/>

      <!-- Analytics title -->
      <rect x="10" y="110" width="45" height="5" rx="1" fill="white" opacity="0.45"/>

      <!-- Conversion chart -->
      <g transform="translate(10, 125)">
        <rect x="0" y="0" width="76" height="55" rx="6" fill="white" opacity="0.06"/>

        <!-- Bar chart -->
        <rect x="8" y="35" width="10" height="12" rx="2" fill="url(#ecom-grad)" opacity="0.5"/>
        <rect x="22" y="28" width="10" height="19" rx="2" fill="url(#ecom-grad)" opacity="0.6"/>
        <rect x="36" y="20" width="10" height="27" rx="2" fill="url(#ecom-grad)" opacity="0.7"/>
        <rect x="50" y="12" width="10" height="35" rx="2" fill="url(#ecom-grad)" opacity="0.8"/>

        <!-- Labels -->
        <rect x="8" y="8" width="35" height="4" rx="1" fill="white" opacity="0.4"/>
      </g>

      <!-- Stats -->
      <g transform="translate(10, 190)">
        <rect x="0" y="0" width="76" height="55" rx="6" fill="url(#ecom-grad)" opacity="0.12"/>

        <rect x="8" y="8" width="40" height="5" rx="1" fill="white" opacity="0.6"/>

        <!-- Big number -->
        <rect x="8" y="20" width="50" height="10" rx="2" fill="white" opacity="0.8"/>

        <!-- Trend -->
        <g transform="translate(8, 38)">
          <path d="M0 8 L6 2 L12 8" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
          <rect x="18" y="3" width="35" height="5" rx="1" fill="#4ade80" opacity="0.6"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Floating elements -->
  <circle cx="22" cy="80" r="4" fill="url(#ecom-grad)" opacity="0.3"/>
  <circle cx="580" cy="375" r="5" fill="white" opacity="0.08"/>

  <!-- AI sparkles -->
  <path d="M570 50 L572 56 L578 58 L572 60 L570 66 L568 60 L562 58 L568 56 Z" fill="url(#ecom-grad)" opacity="0.45"/>
  <path d="M28 360 L29 364 L33 365 L29 366 L28 370 L27 366 L23 365 L27 364 Z" fill="url(#ecom-grad)" opacity="0.35"/>
</svg>
