<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500">
  <defs>
    <!-- Clip paths for circular images -->
    <clipPath id="circle-top-right">
      <circle cx="420" cy="60" r="55"/>
    </clipPath>
    <clipPath id="circle-bottom-left">
      <circle cx="80" cy="380" r="70"/>
    </clipPath>

    <!-- Clip paths for rectangular images -->
    <clipPath id="rect-center">
      <rect x="180" y="100" width="160" height="200" rx="4"/>
    </clipPath>
    <clipPath id="rect-bottom-right">
      <rect x="280" y="320" width="180" height="140" rx="4"/>
    </clipPath>
  </defs>

  <!-- Large decorative triangle - top left pointing down-right -->
  <polygon points="0,80 180,280 0,280" fill="#eb1600"/>

  <!-- Medium decorative triangle - bottom right pointing up-left -->
  <polygon points="500,420 320,420 500,280" fill="#ff6b5c"/>

  <!-- Small accent triangle - middle right -->
  <polygon points="460,200 500,200 500,160" fill="#eb1600"/>

  <!-- Circular image - top right (woman professional) -->
  <g clip-path="url(#circle-top-right)">
    <image
      xlink:href="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=200&h=200&fit=crop&crop=face"
      x="365" y="5" width="110" height="110"
      preserveAspectRatio="xMidYMid slice"
      style="filter: grayscale(100%);"
    />
  </g>
  <circle cx="420" cy="60" r="55" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Rectangular image - center (man working) -->
  <g clip-path="url(#rect-center)">
    <image
      xlink:href="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=400&fit=crop&crop=face"
      x="180" y="100" width="160" height="200"
      preserveAspectRatio="xMidYMid slice"
      style="filter: grayscale(100%);"
    />
  </g>

  <!-- Dark circle with terminal/code icon -->
  <circle cx="160" cy="200" r="50" fill="#1a1a1a"/>
  <text x="160" y="210" text-anchor="middle" font-family="Monaco, Consolas, monospace" font-size="28" font-weight="bold" fill="#ffffff">&gt;_</text>

  <!-- Rectangular image - bottom right (team collaboration) -->
  <g clip-path="url(#rect-bottom-right)">
    <image
      xlink:href="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400&h=300&fit=crop"
      x="280" y="320" width="180" height="140"
      preserveAspectRatio="xMidYMid slice"
      style="filter: grayscale(100%);"
    />
  </g>

  <!-- Circular image - bottom left (woman smiling) -->
  <g clip-path="url(#circle-bottom-left)">
    <image
      xlink:href="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&h=200&fit=crop&crop=face"
      x="10" y="310" width="140" height="140"
      preserveAspectRatio="xMidYMid slice"
      style="filter: grayscale(100%);"
    />
  </g>
  <circle cx="80" cy="380" r="70" fill="none" stroke="#fff" stroke-width="3"/>

  <!-- Small decorative element - dot pattern -->
  <circle cx="380" cy="260" r="4" fill="#eb1600"/>
  <circle cx="395" cy="260" r="4" fill="#eb1600"/>
  <circle cx="410" cy="260" r="4" fill="#eb1600"/>

</svg>
