<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" fill="#1F2937"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="ondemandGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8553D;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#ondemandGrad)"/>

  <!-- Top banner -->
  <rect x="0" y="0" width="400" height="50" fill="#374151"/>
  <rect x="25" y="15" width="10" height="10" rx="2" fill="#E8553D"/>
  <rect x="38" y="15" width="10" height="10" rx="2" fill="#E8553D" opacity="0.6"/>
  <text x="60" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">zunkiree labs</text>
  <text x="180" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">WEBINAR</text>

  <!-- Play button circle -->
  <circle cx="200" cy="140" r="45" fill="#E8553D"/>
  <polygon points="190,120 190,160 220,140" fill="white"/>

  <!-- Title text -->
  <text x="200" y="210" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">From Keywords to Conversations</text>
  <text x="200" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">AI Search Implementation Workshop</text>

  <!-- Decorative elements -->
  <rect x="30" y="80" width="60" height="4" rx="2" fill="#E8553D" opacity="0.3"/>
  <rect x="30" y="90" width="40" height="4" rx="2" fill="#E8553D" opacity="0.2"/>
  <rect x="310" y="80" width="60" height="4" rx="2" fill="#E8553D" opacity="0.3"/>
  <rect x="330" y="90" width="40" height="4" rx="2" fill="#E8553D" opacity="0.2"/>

  <!-- Duration badge -->
  <rect x="320" y="10" width="60" height="24" rx="4" fill="#E8553D"/>
  <text x="350" y="26" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">45 MIN</text>
</svg>
