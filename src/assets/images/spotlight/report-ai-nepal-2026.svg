<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="spot-nepal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2535"/>
      <stop offset="100%" stop-color="#0a1f2b"/>
    </linearGradient>
    <linearGradient id="spot-nepal-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f9b34"/>
      <stop offset="100%" stop-color="#90a959"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#spot-nepal-bg)"/>

  <!-- Sage glow right -->
  <ellipse cx="420" cy="200" rx="180" ry="140" fill="rgba(144,169,89,0.12)"/>

  <!-- Mountain silhouette -->
  <path d="M0 200 L50 140 L100 170 L150 100 L200 130 L250 80 L300 110 L350 70 L400 100 L400 250 L0 250 Z" fill="rgba(144,169,89,0.06)"/>

  <!-- Data bars -->
  <g transform="translate(40, 130)">
    <rect x="0" y="50" width="30" height="40" fill="url(#spot-nepal-accent)" opacity="0.6" rx="2"/>
    <rect x="45" y="30" width="30" height="60" fill="url(#spot-nepal-accent)" opacity="0.7" rx="2"/>
    <rect x="90" y="10" width="30" height="80" fill="url(#spot-nepal-accent)" opacity="0.85" rx="2"/>
    <rect x="135" y="25" width="30" height="65" fill="url(#spot-nepal-accent)" opacity="0.75" rx="2"/>
    <rect x="180" y="0" width="30" height="90" fill="url(#spot-nepal-accent)" rx="2"/>
  </g>

  <!-- Stats box -->
  <g transform="translate(260, 100)">
    <rect width="110" height="70" fill="rgba(255,255,255,0.06)" rx="6" stroke="rgba(144,169,89,0.2)" stroke-width="1"/>
    <text x="55" y="30" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#a3c072" text-anchor="middle">150th</text>
    <text x="55" y="50" font-family="system-ui, sans-serif" font-size="9" fill="#fff" opacity="0.6" text-anchor="middle">AI Readiness</text>
    <text x="55" y="62" font-family="system-ui, sans-serif" font-size="8" fill="#fff" opacity="0.4" text-anchor="middle">of 193 countries</text>
  </g>

  <!-- Featured badge -->
  <rect x="30" y="30" width="80" height="22" fill="url(#spot-nepal-accent)" rx="3"/>
  <text x="70" y="45" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">FEATURED</text>

  <!-- Nepal text -->
  <text x="300" y="50" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#90a959" opacity="0.12">NEPAL</text>
</svg>
