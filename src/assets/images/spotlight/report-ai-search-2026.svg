<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="spot-search-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f9b34"/>
      <stop offset="100%" stop-color="#90a959"/>
    </linearGradient>
    <linearGradient id="stat-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- Transparent background — container gradient shows through -->
  <rect width="400" height="250" fill="transparent"/>

  <!-- Soft white glow top-right -->
  <ellipse cx="370" cy="10" rx="160" ry="100" fill="rgba(255,255,255,0.10)"/>

  <!-- Search icon -->
  <g transform="translate(150, 55)" opacity="0.30">
    <circle cx="40" cy="40" r="30" fill="none" stroke="#ffffff" stroke-width="5.5"/>
    <line x1="62" y1="62" x2="85" y2="85" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Stats -->
  <g transform="translate(30, 152)">
    <rect width="100" height="50" fill="url(#stat-bg)" rx="6" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
    <text x="50" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">340%</text>
    <text x="50" y="41" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Avg ROI</text>
  </g>

  <g transform="translate(150, 152)">
    <rect width="100" height="50" fill="url(#stat-bg)" rx="6" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
    <text x="50" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">45%</text>
    <text x="50" y="41" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Less Support</text>
  </g>

  <g transform="translate(270, 152)">
    <rect width="100" height="50" fill="url(#stat-bg)" rx="6" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
    <text x="50" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">3x</text>
    <text x="50" y="41" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.75)" text-anchor="middle">Satisfaction</text>
  </g>

  <!-- Badge -->
  <rect x="30" y="28" width="60" height="22" fill="url(#spot-search-accent)" rx="3"/>
  <text x="60" y="43" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">REPORT</text>

  <!-- Year -->
  <text x="310" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.25">2026</text>
</svg>
