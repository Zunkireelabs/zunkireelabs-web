<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="reportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8553D"/>
      <stop offset="100%" style="stop-color:#C44332"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#reportGrad)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="200" r="120" fill="#D64A35" opacity="0.5"/>
  <circle cx="350" cy="50" r="80" fill="#F5675A" opacity="0.3"/>

  <!-- Left side stat callout -->
  <rect x="30" y="140" width="120" height="80" rx="8" fill="#C44332"/>
  <text x="45" y="175" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="white">500+</text>
  <text x="45" y="200" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">companies</text>
  <text x="45" y="214" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">surveyed</text>

  <!-- Right side - Report cover -->
  <rect x="180" y="40" width="180" height="170" rx="8" fill="white" opacity="0.95"/>
  <rect x="195" y="55" width="80" height="8" rx="2" fill="#E8553D"/>
  <text x="195" y="95" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1F2937">State of</text>
  <text x="195" y="118" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1F2937">AI Search</text>
  <text x="195" y="145" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#E8553D">2026</text>

  <!-- Chart bars decoration -->
  <rect x="195" y="165" width="20" height="30" rx="2" fill="#E8553D" opacity="0.3"/>
  <rect x="220" y="155" width="20" height="40" rx="2" fill="#E8553D" opacity="0.5"/>
  <rect x="245" y="145" width="20" height="50" rx="2" fill="#E8553D" opacity="0.7"/>
  <rect x="270" y="135" width="20" height="60" rx="2" fill="#E8553D"/>

  <!-- Zunkiree logo text -->
  <text x="300" y="200" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">zunkiree labs</text>
</svg>
