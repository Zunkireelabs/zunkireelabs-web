<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="spot-playbook-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1e2c"/>
      <stop offset="100%" stop-color="#091828"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#spot-playbook-bg)"/>

  <!-- Sage glow bottom-left -->
  <ellipse cx="0" cy="260" rx="160" ry="120" fill="rgba(144,169,89,0.10)"/>

  <!-- Code editor mini -->
  <g transform="translate(30, 50)">
    <rect width="340" height="150" fill="rgba(255,255,255,0.03)" rx="6" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="340" height="24" fill="rgba(255,255,255,0.04)" rx="6"/>
    <rect y="18" width="340" height="6" fill="rgba(255,255,255,0.04)"/>

    <!-- Window buttons -->
    <circle cx="15" cy="12" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="30" cy="12" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="45" cy="12" r="4" fill="rgba(144,169,89,0.6)"/>

    <!-- Code lines -->
    <g font-family="monospace" font-size="10" transform="translate(15, 40)">
      <text fill="#90a959">const</text>
      <text x="35" fill="rgba(255,255,255,0.7)"> search = </text>
      <text x="95" fill="#90a959">await</text>
      <text x="130" fill="#b6cf96"> zunkiree</text>
      <text x="185" fill="rgba(255,255,255,0.7)">.</text>
      <text x="190" fill="#b6cf96">query</text>
      <text x="220" fill="rgba(255,255,255,0.7)">({</text>
    </g>
    <g font-family="monospace" font-size="10" transform="translate(15, 58)">
      <text fill="rgba(255,255,255,0.7)">  question: </text>
      <text x="75" fill="#a3c072">"natural language"</text>
    </g>
    <g font-family="monospace" font-size="10" transform="translate(15, 76)">
      <text fill="rgba(255,255,255,0.7)">});</text>
    </g>
    <g font-family="monospace" font-size="10" transform="translate(15, 100)">
      <text fill="rgba(255,255,255,0.25)">// Returns AI-powered results</text>
    </g>

    <!-- Cursor -->
    <rect x="95" y="115" width="2" height="12" fill="#6f9b34">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ebook badge -->
  <rect x="30" y="25" width="60" height="20" fill="#6f9b34" rx="3"/>
  <text x="60" y="39" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff" text-anchor="middle">EBOOK</text>

  <!-- Playbook label -->
  <text x="320" y="38" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#90a959" opacity="0.45" text-anchor="middle">PLAYBOOK</text>
</svg>
