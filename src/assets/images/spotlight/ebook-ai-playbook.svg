<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <!-- Background -->
  <rect width="400" height="250" fill="#1F2937"/>

  <!-- Decorative grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#374151" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="250" fill="url(#grid)" opacity="0.5"/>

  <!-- Book cover - left side -->
  <rect x="30" y="30" width="160" height="190" rx="4" fill="#111827"/>
  <rect x="30" y="30" width="160" height="190" rx="4" stroke="#374151" stroke-width="1"/>

  <!-- Book spine shadow -->
  <rect x="25" y="35" width="8" height="180" fill="#0D0D0D" rx="2"/>

  <!-- Book content -->
  <rect x="45" y="45" width="80" height="6" rx="2" fill="#E8553D"/>
  <text x="45" y="80" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">ZUNKIREE LABS</text>
  <text x="45" y="110" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">AI Search</text>
  <text x="45" y="132" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white">Playbook</text>

  <!-- Book decorative element -->
  <rect x="45" y="150" width="130" height="1" fill="#374151"/>
  <text x="45" y="175" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">For Product Teams</text>
  <text x="45" y="190" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">2026 Edition</text>

  <!-- Right side - Features callout -->
  <rect x="220" y="50" width="150" height="150" rx="8" fill="#E8553D"/>
  <text x="240" y="85" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white">Includes</text>

  <!-- Feature list -->
  <circle cx="250" cy="115" r="4" fill="white" opacity="0.8"/>
  <text x="265" y="119" font-family="system-ui, sans-serif" font-size="12" fill="white">Implementation guides</text>

  <circle cx="250" cy="140" r="4" fill="white" opacity="0.8"/>
  <text x="265" y="144" font-family="system-ui, sans-serif" font-size="12" fill="white">Code examples</text>

  <circle cx="250" cy="165" r="4" fill="white" opacity="0.8"/>
  <text x="265" y="169" font-family="system-ui, sans-serif" font-size="12" fill="white">Real case studies</text>

  <!-- Page count badge -->
  <rect x="300" y="200" width="70" height="30" rx="4" fill="#111827"/>
  <text x="335" y="220" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">50+ pages</text>
</svg>
