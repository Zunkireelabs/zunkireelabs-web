<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="booking-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c"/>
      <stop offset="100%" style="stop-color:#eb1600"/>
    </linearGradient>
    <linearGradient id="booking-grad-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b5c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#eb1600;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Main calendar container -->
  <g transform="translate(100, 30)">
    <rect x="0" y="0" width="400" height="340" rx="14" fill="white" opacity="0.07"/>
    <rect x="0" y="0" width="400" height="340" rx="14" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>

    <!-- Calendar Header -->
    <rect x="0" y="0" width="400" height="50" rx="14" fill="white" opacity="0.05"/>
    <rect x="20" y="16" width="100" height="8" rx="2" fill="white" opacity="0.6"/>
    <rect x="20" y="28" width="60" height="5" rx="1" fill="white" opacity="0.3"/>

    <!-- Month navigation -->
    <g transform="translate(320, 16)">
      <rect x="0" y="0" width="28" height="20" rx="5" fill="white" opacity="0.1"/>
      <path d="M10 10 L14 6 L14 14 Z" fill="white" opacity="0.5"/>
      <rect x="36" y="0" width="28" height="20" rx="5" fill="white" opacity="0.1"/>
      <path d="M54 10 L50 6 L50 14 Z" fill="white" opacity="0.5"/>
    </g>

    <!-- Day Headers -->
    <g transform="translate(20, 60)" fill="white" opacity="0.4" font-size="11" font-family="system-ui">
      <text x="26" y="0" text-anchor="middle">Mon</text>
      <text x="78" y="0" text-anchor="middle">Tue</text>
      <text x="130" y="0" text-anchor="middle">Wed</text>
      <text x="182" y="0" text-anchor="middle">Thu</text>
      <text x="234" y="0" text-anchor="middle">Fri</text>
      <text x="286" y="0" text-anchor="middle">Sat</text>
      <text x="338" y="0" text-anchor="middle">Sun</text>
    </g>

    <!-- Calendar Grid -->
    <g transform="translate(20, 75)">
      <!-- Week 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="8" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">1</text>

        <rect x="52" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="60" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">2</text>

        <rect x="104" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="112" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">3</text>
        <!-- Booked slot indicator -->
        <rect x="112" y="28" width="36" height="6" rx="2" fill="url(#booking-grad)" opacity="0.6"/>

        <rect x="156" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="164" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">4</text>

        <rect x="208" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="216" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">5</text>
        <!-- Multiple slots -->
        <rect x="216" y="24" width="36" height="5" rx="1" fill="url(#booking-grad)" opacity="0.7"/>
        <rect x="216" y="32" width="36" height="5" rx="1" fill="url(#booking-grad)" opacity="0.4"/>

        <rect x="260" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="268" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">6</text>

        <rect x="312" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="320" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">7</text>
      </g>

      <!-- Week 2 -->
      <g transform="translate(0, 56)">
        <rect x="0" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="8" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">8</text>

        <rect x="52" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="60" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">9</text>
        <rect x="60" y="28" width="36" height="6" rx="2" fill="url(#booking-grad)" opacity="0.5"/>

        <!-- Selected/Active Day -->
        <rect x="104" y="0" width="50" height="50" rx="8" fill="url(#booking-grad)" opacity="0.8"/>
        <rect x="104" y="0" width="50" height="50" rx="8" stroke="url(#booking-grad)" stroke-width="2" fill="none"/>
        <text x="112" y="18" fill="white" opacity="0.95" font-size="12" font-weight="600" font-family="system-ui">10</text>
        <rect x="112" y="24" width="36" height="5" rx="1" fill="white" opacity="0.8"/>
        <rect x="112" y="32" width="36" height="5" rx="1" fill="white" opacity="0.6"/>
        <rect x="112" y="40" width="20" height="5" rx="1" fill="white" opacity="0.4"/>

        <rect x="156" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="164" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">11</text>

        <rect x="208" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="216" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">12</text>
        <rect x="216" y="28" width="36" height="6" rx="2" fill="url(#booking-grad)" opacity="0.4"/>

        <rect x="260" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="268" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">13</text>

        <rect x="312" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="320" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">14</text>
      </g>

      <!-- Week 3 -->
      <g transform="translate(0, 112)">
        <rect x="0" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="8" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">15</text>

        <rect x="52" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="60" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">16</text>

        <rect x="104" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="112" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">17</text>
        <rect x="112" y="28" width="36" height="6" rx="2" fill="url(#booking-grad)" opacity="0.5"/>

        <rect x="156" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="164" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">18</text>

        <rect x="208" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="216" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">19</text>

        <rect x="260" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="268" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">20</text>

        <rect x="312" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="320" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">21</text>
      </g>

      <!-- Week 4 (partial) -->
      <g transform="translate(0, 168)">
        <rect x="0" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="8" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">22</text>

        <rect x="52" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="60" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">23</text>
        <rect x="60" y="28" width="36" height="6" rx="2" fill="url(#booking-grad)" opacity="0.45"/>

        <rect x="104" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="112" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">24</text>

        <rect x="156" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="164" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">25</text>
        <rect x="164" y="24" width="36" height="5" rx="1" fill="url(#booking-grad)" opacity="0.6"/>
        <rect x="164" y="32" width="36" height="5" rx="1" fill="url(#booking-grad)" opacity="0.35"/>

        <rect x="208" y="0" width="50" height="50" rx="8" fill="white" opacity="0.04"/>
        <text x="216" y="18" fill="white" opacity="0.4" font-size="12" font-family="system-ui">26</text>

        <rect x="260" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="268" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">27</text>

        <rect x="312" y="0" width="50" height="50" rx="8" fill="white" opacity="0.03"/>
        <text x="320" y="18" fill="white" opacity="0.25" font-size="12" font-family="system-ui">28</text>
      </g>
    </g>
  </g>

  <!-- Time Slots Sidebar -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="55" height="180" rx="10" fill="white" opacity="0.06"/>
    <rect x="0" y="0" width="55" height="180" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.12"/>

    <!-- Time labels -->
    <text x="28" y="28" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">9:00</text>
    <text x="28" y="58" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">10:00</text>
    <text x="28" y="88" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">11:00</text>
    <text x="28" y="118" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">12:00</text>
    <text x="28" y="148" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">1:00</text>
    <text x="28" y="168" text-anchor="middle" fill="white" opacity="0.4" font-size="10" font-family="system-ui">2:00</text>

    <!-- Booked time indicators -->
    <rect x="8" y="35" width="40" height="16" rx="4" fill="url(#booking-grad)" opacity="0.7"/>
    <rect x="8" y="95" width="40" height="16" rx="4" fill="url(#booking-grad)" opacity="0.5"/>
  </g>

  <!-- Upcoming Bookings Panel -->
  <g transform="translate(515, 60)">
    <rect x="0" y="0" width="70" height="180" rx="10" fill="white" opacity="0.06"/>
    <rect x="0" y="0" width="70" height="180" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.12"/>

    <!-- Header -->
    <rect x="10" y="12" width="40" height="5" rx="1" fill="white" opacity="0.5"/>

    <!-- Booking card 1 -->
    <g transform="translate(8, 28)">
      <rect x="0" y="0" width="54" height="40" rx="6" fill="url(#booking-grad)" opacity="0.25"/>
      <rect x="0" y="0" width="54" height="40" rx="6" stroke="url(#booking-grad)" stroke-width="1" fill="none" opacity="0.4"/>
      <rect x="8" y="8" width="30" height="4" rx="1" fill="white" opacity="0.7"/>
      <rect x="8" y="16" width="38" height="3" rx="1" fill="white" opacity="0.4"/>
      <rect x="8" y="24" width="24" height="3" rx="1" fill="white" opacity="0.3"/>
      <circle cx="46" cy="32" r="5" fill="#4ade80" opacity="0.7"/>
      <path d="M43 32 L45 34 L49 30" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Booking card 2 -->
    <g transform="translate(8, 76)">
      <rect x="0" y="0" width="54" height="36" rx="6" fill="white" opacity="0.08"/>
      <rect x="8" y="8" width="28" height="4" rx="1" fill="white" opacity="0.5"/>
      <rect x="8" y="16" width="36" height="3" rx="1" fill="white" opacity="0.3"/>
      <rect x="8" y="24" width="20" height="3" rx="1" fill="white" opacity="0.2"/>
    </g>

    <!-- Booking card 3 -->
    <g transform="translate(8, 120)">
      <rect x="0" y="0" width="54" height="32" rx="6" fill="white" opacity="0.06"/>
      <rect x="8" y="8" width="26" height="4" rx="1" fill="white" opacity="0.4"/>
      <rect x="8" y="16" width="32" height="3" rx="1" fill="white" opacity="0.25"/>
    </g>

    <!-- Add new indicator -->
    <g transform="translate(8, 158)">
      <circle cx="27" cy="10" r="8" stroke="white" stroke-width="1.5" stroke-dasharray="3 2" fill="none" opacity="0.3"/>
      <line x1="27" y1="6" x2="27" y2="14" stroke="white" stroke-width="1.5" opacity="0.35"/>
      <line x1="23" y1="10" x2="31" y2="10" stroke="white" stroke-width="1.5" opacity="0.35"/>
    </g>
  </g>

  <!-- AI Smart Suggestion Bubble -->
  <g transform="translate(510, 270)">
    <rect x="0" y="0" width="80" height="60" rx="10" fill="white" opacity="0.08"/>
    <rect x="0" y="0" width="80" height="60" rx="10" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- AI sparkle icon -->
    <g transform="translate(8, 10)">
      <path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z" fill="url(#booking-grad)" opacity="0.8"/>
    </g>

    <rect x="28" y="10" width="42" height="5" rx="1" fill="white" opacity="0.5"/>
    <rect x="28" y="18" width="30" height="4" rx="1" fill="white" opacity="0.3"/>

    <!-- Suggested time pill -->
    <rect x="10" y="35" width="60" height="16" rx="6" fill="url(#booking-grad)" opacity="0.5"/>
    <rect x="16" y="40" width="35" height="5" rx="1" fill="white" opacity="0.8"/>
  </g>

  <!-- Floating decorative elements -->
  <circle cx="50" cy="60" r="4" fill="url(#booking-grad)" opacity="0.25"/>
  <circle cx="575" cy="350" r="5" fill="white" opacity="0.1"/>

  <!-- AI sparkles -->
  <path d="M560 40 L562 46 L568 48 L562 50 L560 56 L558 50 L552 48 L558 46 Z" fill="url(#booking-grad)" opacity="0.5"/>
  <path d="M70 320 L71 324 L75 325 L71 326 L70 330 L69 326 L65 325 L69 324 Z" fill="url(#booking-grad)" opacity="0.35"/>
</svg>
